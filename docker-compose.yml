services:
  livekit:
    image: livekit/livekit-server@sha256:100b9a870616d02f5e3795b34e0b593b5054a26f8131a94fd3fa322ed3154b16
    command: --dev --bind 0.0.0.0 --node-ip 127.0.0.1
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882-7892:7882-7892/udp"

  app:
    build: .
    ports:
      - "3001:3000"
    depends_on:
      - livekit
    environment:
      - VOICE_PROVIDER=nova-sonic
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN}
      - AWS_REGION=us-east-1
      - LIVEKIT_URL=ws://livekit:7880
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:-devkey}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:-secret}
      - NOVA_SONIC_MODEL=amazon.nova-sonic-v1:0
      - NOVA_SONIC_VOICE=matthew
      - APP_API_TOKEN=${APP_API_TOKEN:-}
