services:
  livekit:
    image: livekit/livekit-server:v1.9.1@sha256:c039a1bfa154c8479ac369c380665638e92a7e9531e69664549c0c0d3eb65e63
    command: --dev --bind 0.0.0.0 --node-ip 127.0.0.1
    ports:
      - "127.0.0.1:7880:7880"
      - "127.0.0.1:7881:7881"
      - "127.0.0.1:7882-7892:7882-7892/udp"

  app:
    build: .
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      - livekit
    environment:
      - VOICE_PROVIDER=${VOICE_PROVIDER:-nova-sonic}
      - APP_ENV=local
      - APP_AUTH_MODE=${APP_AUTH_MODE:-token}
      - APP_API_TOKEN=${APP_API_TOKEN:?set APP_API_TOKEN via scripts/dc-up-keychain.sh or an exported environment variable}
      - APP_LOCAL_LOGIN_TOKEN=${APP_LOCAL_LOGIN_TOKEN:-}
      - APP_ROOM_ID=${APP_ROOM_ID:-kanban-meeting}
      - APP_BOARD_ID=${APP_BOARD_ID:-default}
      - BOARD_SQLITE_PATH=${BOARD_SQLITE_PATH:-/srv/data/board.sqlite}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN}
      - AWS_REGION=us-east-1
      - AWS_DEFAULT_REGION=us-east-1
      - APP_LOCAL_AWS_REFRESH_URL=${APP_LOCAL_AWS_REFRESH_URL:-}
      - APP_LOCAL_AWS_REFRESH_TOKEN=${APP_LOCAL_AWS_REFRESH_TOKEN:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_REALTIME_MODEL=${OPENAI_REALTIME_MODEL:-gpt-realtime-2}
      - OPENAI_REALTIME_TRANSCRIPTION_MODEL=${OPENAI_REALTIME_TRANSCRIPTION_MODEL:-gpt-realtime-whisper}
      - OPENAI_REALTIME_TRANSLATION_MODEL=${OPENAI_REALTIME_TRANSLATION_MODEL:-gpt-realtime-translate}
      - OPENAI_REALTIME_TRANSLATION_TARGET_LANGUAGE=${OPENAI_REALTIME_TRANSLATION_TARGET_LANGUAGE:-en}
      - LIVEKIT_URL=ws://livekit:7880
      - LIVEKIT_BROWSER_URL=${LIVEKIT_BROWSER_URL:-ws://127.0.0.1:7880}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:-devkey}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:-secret}
      - NOVA_SONIC_MODEL=${NOVA_SONIC_MODEL:-amazon.nova-2-sonic-v1:0}
      - NOVA_SONIC_VOICE=${NOVA_SONIC_VOICE:-matthew}
      - AGENT_PM_MODEL=${AGENT_PM_MODEL:-us.anthropic.claude-haiku-4-5-20251001-v1:0}
      - AGENT_REVIEW_MODEL=${AGENT_REVIEW_MODEL:-us.anthropic.claude-sonnet-4-6}
      - AGENT_COST_BUDGET_CENTS=${AGENT_COST_BUDGET_CENTS:-250}
      - AGENT_PM_CALL_ESTIMATE_CENTS=${AGENT_PM_CALL_ESTIMATE_CENTS:-2}
      - AGENT_REVIEW_CALL_ESTIMATE_CENTS=${AGENT_REVIEW_CALL_ESTIMATE_CENTS:-40}
      - AUTO_BOT_BASELINE_MEETING_MINUTES=${AUTO_BOT_BASELINE_MEETING_MINUTES:-15}
      - GITHUB_APP_ID=${GITHUB_APP_ID:-}
      - GITHUB_APP_INSTALLATION_ID=${GITHUB_APP_INSTALLATION_ID:-}
      - GITHUB_APP_PRIVATE_KEY=${GITHUB_APP_PRIVATE_KEY:-}
      - GITHUB_DEFAULT_REPO=${GITHUB_DEFAULT_REPO:-}
      - GITHUB_ALLOWED_REPOS=${GITHUB_ALLOWED_REPOS:-}
      - GITHUB_PR_COMMENTS_ENABLED=${GITHUB_PR_COMMENTS_ENABLED:-false}
      - JIRA_CONFIG_PATH=${JIRA_CONFIG_PATH:-}
      - JIRA_CONFIG_JSON=${JIRA_CONFIG_JSON:-}
      - JIRA_API_TOKEN=${JIRA_API_TOKEN:-}
      - JIRA_WEBHOOK_SECRET=${JIRA_WEBHOOK_SECRET:-}
      - AUDIT_LOG_PATH=${AUDIT_LOG_PATH:-}
      - TRUST_PROXY_HEADERS=${TRUST_PROXY_HEADERS:-}
    volumes:
      - ./config:/srv/config:ro
      - board-data:/srv/data

  mcpd:
    build:
      context: .
      dockerfile: Dockerfile.mcpd
    ports:
      - "127.0.0.1:4000:4000"
    depends_on:
      - app
    environment:
      - MCPD_TRANSPORT=http
      - MCPD_PORT=4000
      - MCPD_TOKEN=${MCPD_TOKEN:-dev-mcp-token-change-me}
      - APP_TENANT_ID=${APP_TENANT_ID:-default}
      - APP_BOARD_ID=${APP_BOARD_ID:-default}
      # mcpd dispatches every MCP tool call through cmd/server's
      # /internal/tools/dispatch endpoint so ActionLedger + risk gates
      # apply uniformly to voice, UI, and MCP callers. BOARD_TOKEN is the
      # shared APP_API_TOKEN that authenticates the dispatch.
      - BOARD_URL=${BOARD_URL:-http://app:3000}
      - BOARD_TOKEN=${APP_API_TOKEN:?set APP_API_TOKEN via scripts/dc-up-keychain.sh or an exported environment variable}
    # board-data is retained for future direct-access optimizations but
    # is not load-bearing for S2.1; the live board state is fetched via
    # HTTP from the app service.
    volumes:
      - board-data:/srv/data

volumes:
  board-data:
