# Example Secret for auto-bot — DO NOT COMMIT a filled-in copy.
#
# Create your real Secret out-of-band (kubectl, Sealed Secrets, External Secrets,
# SOPS, etc.). The chart references it via `existingSecret` in values.yaml and
# injects the keys listed in `secretEnvKeys`.
#
# Quick start (replace the values, then apply):
#
#   kubectl create secret generic auto-bot-secrets \
#     --namespace <your-namespace> \
#     --from-literal=APP_API_TOKEN="$(openssl rand -hex 32)" \
#     --from-literal=LIVEKIT_URL="wss://your-project.livekit.cloud" \
#     --from-literal=LIVEKIT_API_KEY="..." \
#     --from-literal=LIVEKIT_API_SECRET="..." \
#     --from-literal=LIVEKIT_BROWSER_URL="wss://your-project.livekit.cloud"
#
# For GitOps, seal it so it's safe to commit:
#   kubectl create secret generic auto-bot-secrets --dry-run=client -o yaml \
#     --from-literal=APP_API_TOKEN=... | kubeseal -o yaml > sealed-secret.yaml
#
# If using IAM Roles Anywhere, also create the cert Secret:
#   kubectl create secret generic auto-bot-ra-cert \
#     --from-file=leaf.crt=leaf.crt --from-file=leaf.key=leaf.key
---
apiVersion: v1
kind: Secret
metadata:
  name: auto-bot-secrets
type: Opaque
stringData:
  APP_API_TOKEN: "replace-with-a-long-random-string"
  LIVEKIT_URL: "wss://your-project.livekit.cloud"
  LIVEKIT_API_KEY: "replace-me"
  LIVEKIT_API_SECRET: "replace-me"
  LIVEKIT_BROWSER_URL: "wss://your-project.livekit.cloud"
