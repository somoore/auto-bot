<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Realtime Kanban Meeting Assistant (LiveKit)</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #202124;
        color: #e8eaed;
        --accent: #1a73e8;
        --accent-soft: rgba(26, 115, 232, 0.25);
        --green: #34a853;
        --red: #ea4335;
        --yellow: #fbbc04;
        --surface: #292a2d;
        --surface-raised: #3c4043;
        --border: rgba(255, 255, 255, 0.08);
        --border-strong: rgba(255, 255, 255, 0.16);
        --text-primary: #e8eaed;
        --text-secondary: #bdc1c6;
        --text-muted: #5f6368;
        --radius: 10px;
      }

      * { box-sizing: border-box; margin: 0; }
      html, body { height: 100%; overflow: hidden; }

      main {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        gap: 8px;
        height: 100vh;
        height: 100dvh;
        padding: 10px;
        padding: max(10px, env(safe-area-inset-top)) max(10px, env(safe-area-inset-right)) max(10px, env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-left));
        overflow: hidden;
      }

      /* ── Top bar ── */
      .topbar {
        display: flex; align-items: center; gap: 10px;
        border-radius: var(--radius); background: var(--surface-raised);
        padding: 6px 12px; min-height: 36px;
      }

      .topbar-pill {
        display: inline-grid; place-items: center;
        width: 24px; height: 24px; border-radius: 999px;
        background: var(--text-muted); color: #fff;
        font-size: 12px; font-weight: 800;
      }

      .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 6px; }

      h1 { font-size: 13px; line-height: 1.2; }
      .status { color: var(--text-secondary); font-size: 13px; line-height: 1.45; }

      /* ── Layout switcher ── */
      .layout-switcher {
        position: relative;
        display: inline-flex;
      }

      .layout-btn {
        display: inline-grid; place-items: center;
        width: 32px; height: 32px; padding: 0;
        border: 0; border-radius: 6px;
        background: transparent; color: var(--text-secondary);
        cursor: pointer; transition: background 0.12s, color 0.12s;
      }

      .layout-btn:hover { background: rgba(255,255,255,0.08); color: var(--text-primary); }
      .layout-btn.active { background: var(--accent); color: #fff; }
      .layout-btn svg { width: 18px; height: 18px; fill: currentColor; }
      .layout-btn[title]::after { content: none; }

      .layout-group {
        display: flex; gap: 2px;
        background: rgba(255,255,255,0.04);
        border-radius: 8px; padding: 2px;
      }

      /* ── Participant tiles (shared) ── */
      .participant-tile {
        position: relative;
        border-radius: var(--radius);
        background: #111418;
        border: 2px solid transparent;
        overflow: hidden;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }

      .participant-tile.speaking {
        border-color: var(--green);
        box-shadow: 0 0 0 1px var(--green), 0 0 12px rgba(52, 168, 83, 0.3);
      }

      .participant-tile.local { border-color: var(--accent); }
      .participant-tile.local.speaking { border-color: var(--green); }

      .participant-tile video {
        width: 100%; height: 100%;
        object-fit: cover; display: block;
      }

      .participant-tile.local video { transform: scaleX(-1); }

      .participant-tile .avatar-placeholder {
        display: grid; place-items: center;
        width: 100%; height: 100%;
        background: linear-gradient(135deg, #2d2e30 0%, #1a1b1d 100%);
      }

      .avatar-circle {
        border-radius: 50%;
        display: grid; place-items: center;
        font-weight: 700; color: #fff;
      }

      .participant-label {
        position: absolute;
        bottom: 4px; left: 4px; right: 4px;
        display: flex; align-items: center; gap: 4px;
        border-radius: 6px;
        background: rgba(32, 33, 36, 0.82);
        padding: 3px 6px;
        font-size: 11px; font-weight: 700; color: #fff;
        overflow: hidden;
      }

      .participant-name {
        overflow: hidden; text-overflow: ellipsis;
        white-space: nowrap; flex: 1;
      }

      .participant-muted-icon {
        flex: 0 0 auto; width: 12px; height: 12px; opacity: 0.7;
      }

      .participant-muted-icon.hidden { display: none; }

      /* ── Transcription panel ── */
      .transcription-panel {
        display: flex; flex-direction: column; overflow: hidden;
        border-radius: var(--radius); background: #111418;
        box-shadow: inset 0 0 0 1px var(--border);
        min-width: 0; min-height: 0;
      }

      .transcription-header {
        display: flex; align-items: center; gap: 8px;
        padding: 10px 14px;
        border-bottom: 1px solid var(--border);
        font-size: 13px; font-weight: 700; color: var(--text-secondary);
      }

      .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); }

      .dot.live {
        background: var(--green);
        animation: pulse-dot 1.5s ease-in-out infinite;
      }

      @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

      .transcription-scroll { flex: 1; overflow-y: auto; padding: 12px 14px; }
      .transcript-entry { margin-bottom: 12px; line-height: 1.5; }
      .transcript-entry .speaker { font-weight: 700; font-size: 12px; margin-bottom: 2px; }
      .transcript-entry .speaker.user-speaker { color: #8ab4f8; }
      .transcript-entry .speaker.assistant-speaker { color: #81c995; }
      .transcript-entry .text { font-size: 13px; color: var(--text-primary); white-space: pre-wrap; }
      .transcript-entry .timestamp { font-size: 11px; color: var(--text-muted); margin-left: 8px; font-weight: 400; }

      /* ── Kanban board ── */
      .board-surface {
        min-height: 0; max-width: 100%; height: 100%; overflow: auto;
        border-radius: 8px; background: #f5f6f8; color: #17191f; padding: 16px;
      }

      .presentation-tile {
        display: grid; min-width: 0; min-height: 0; overflow: hidden;
      }

      .board {
        display: grid;
        grid-template-columns: repeat(4, minmax(170px, 1fr));
        gap: 12px; align-items: start; min-width: 736px;
      }

      .column, .card {
        border: 1px solid #dde2eb; border-radius: 8px; background: #ffffff;
        transition: box-shadow 0.3s ease, border-color 0.3s ease;
      }

      .card.highlighted {
        border-color: #4285f4;
        box-shadow: 0 0 0 2px #4285f4, 0 4px 16px rgba(66, 133, 244, 0.3);
        animation: pulse-highlight 1s ease-in-out 3;
      }

      @keyframes pulse-highlight {
        0%, 100% { box-shadow: 0 0 0 2px #4285f4, 0 4px 16px rgba(66, 133, 244, 0.3); }
        50% { box-shadow: 0 0 0 4px #4285f4, 0 4px 24px rgba(66, 133, 244, 0.5); }
      }

      .column { display: grid; gap: 10px; min-width: 0; padding: 12px; }
      .column header { display: flex; align-items: center; justify-content: space-between; }
      .column h2 { font-size: 14px; line-height: 1.3; }

      .count {
        display: inline-grid; place-items: center;
        min-width: 24px; min-height: 24px; padding: 0 7px;
        border-radius: 999px; background: #edf1f7;
        color: #5d6572; font-size: 12px; font-weight: 700;
      }

      .stack, .card { display: grid; gap: 10px; }
      .card { padding: 11px; background: #fbfcfe; cursor: pointer; }
      .card:focus-visible { outline: 3px solid rgba(26, 115, 232, 0.35); outline-offset: 2px; }
      .card-heading { display: grid; grid-template-columns: minmax(0, 1fr) auto; align-items: start; gap: 8px; }
      .card-heading strong { min-width: 0; overflow-wrap: anywhere; }

      .owner-avatar {
        display: inline-grid; place-items: center; overflow: hidden;
        width: 28px; height: 28px;
        border: 2px solid #ffffff; border-radius: 999px;
        background: #f6f8fa; box-shadow: 0 0 0 1px rgba(27, 31, 36, 0.16);
      }

      .owner-avatar svg { display: block; width: 100%; height: 100%; }
      .owner-avatar.large { width: 42px; height: 42px; border-width: 3px; }

      .card.moved {
        animation: card-move-wiggle 1100ms ease-in-out;
        border-color: var(--accent); box-shadow: 0 10px 24px rgba(26, 115, 232, 0.22);
        transform-origin: 50% 50%; will-change: transform;
      }

      .card strong { font-size: 14px; line-height: 1.3; }
      .card p { color: #66707f; font-size: 13px; line-height: 1.45; }

      .tags { display: flex; flex-wrap: wrap; gap: 6px; padding: 0; list-style: none; }

      .tags li {
        padding: 4px 8px; border-radius: 999px;
        background: var(--tag-bg); color: var(--tag-color);
        font-size: 12px; font-weight: 700; line-height: 1;
      }

      .empty { color: #bdc1c6; font-size: 13px; line-height: 1.45; }

      /* ── Meeting bar ── */
      .meeting-bar {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
        align-items: center; gap: 12px; min-height: 52px;
      }

      .log { color: var(--text-secondary); font-size: 13px; line-height: 1.45; padding: 0 2px; }
      .controls { display: flex; align-items: center; gap: 8px; justify-content: center; flex-wrap: wrap; }

      button {
        border: 0; border-radius: 999px;
        background: var(--surface-raised); color: inherit;
        cursor: pointer; font: inherit; font-weight: 600;
        min-width: 44px; padding: 10px 16px;
        transition: background 0.15s, opacity 0.15s;
      }

      button:hover { filter: brightness(1.15); }
      button:disabled { cursor: not-allowed; opacity: 0.45; }
      button.primary { background: var(--accent); color: #fff; }
      #leave { background: var(--red); color: #fff; }
      #confirmBoard { background: var(--green); color: #fff; }
      #confirmBoard.confirmed { background: #1e8e3e; opacity: 0.7; cursor: default; }

      .media-btn {
        display: inline-grid; place-items: center;
        width: 44px; height: 44px; padding: 0; border-radius: 50%;
        background: var(--surface-raised); transition: background 0.15s;
      }

      .media-btn svg { width: 20px; height: 20px; fill: var(--text-primary); }
      .media-btn.off { background: var(--red); }
      .media-btn.off svg { fill: #fff; }
      .media-btn:disabled { opacity: 0.35; }

      .participant-count {
        font-size: 12px; font-weight: 700; color: var(--text-secondary); padding: 0 4px;
      }

      /* ═══════════════════════════════════════════════
         LAYOUT MODES — controlled by main[data-layout]
         ═══════════════════════════════════════════════ */

      /* ── FILMSTRIP (default): horizontal strip above workspace ── */
      main[data-layout="filmstrip"] .workspace-area {
        display: flex;
        flex-direction: column;
        gap: 0; min-height: 0;
      }

      main[data-layout="filmstrip"] .spotlight-area {
        flex: 0 0 auto;
        height: var(--filmstrip-video-h, 128px);
        min-height: 60px;
      }

      main[data-layout="filmstrip"] .video-area {
        display: flex; gap: 6px; padding: 4px 0;
        overflow-x: auto; scroll-snap-type: x mandatory;
        height: 100%;
      }

      main[data-layout="filmstrip"] .video-area:empty { display: none; }
      main[data-layout="filmstrip"] .video-area::-webkit-scrollbar { height: 4px; }
      main[data-layout="filmstrip"] .video-area::-webkit-scrollbar-track { background: transparent; }
      main[data-layout="filmstrip"] .video-area::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 4px; }

      main[data-layout="filmstrip"] .participant-tile {
        flex: 0 0 auto; width: 160px; height: 100%;
        scroll-snap-align: start;
      }

      main[data-layout="filmstrip"] .avatar-circle { width: 48px; height: 48px; font-size: 20px; }

      main[data-layout="filmstrip"] .content-area {
        display: flex;
        gap: 0; min-height: 0; overflow: hidden;
        flex: 1;
      }

      main[data-layout="filmstrip"] .content-area .presentation-tile {
        flex: 1; min-width: 0; min-height: 0;
      }

      main[data-layout="filmstrip"] .content-area .transcription-panel {
        width: var(--filmstrip-transcription-w, 340px);
        min-width: 180px; flex-shrink: 0;
      }

      main[data-layout="filmstrip"] .spotlight-tile { display: none; }

      /* ── SIDEBAR: video column on the RIGHT, content dominant on LEFT ── */
      main[data-layout="sidebar"] .workspace-area {
        display: flex;
        gap: 0; min-height: 0;
      }

      main[data-layout="sidebar"] .spotlight-area {
        order: 3;
        width: var(--sidebar-video-w, 180px);
        min-width: 100px; flex-shrink: 0;
      }

      main[data-layout="sidebar"] .video-area {
        display: flex; flex-direction: column; gap: 6px;
        overflow-y: auto;
        padding: 4px 0;
        height: 100%;
      }

      main[data-layout="sidebar"] .video-area::-webkit-scrollbar { width: 4px; }
      main[data-layout="sidebar"] .video-area::-webkit-scrollbar-track { background: transparent; }
      main[data-layout="sidebar"] .video-area::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 4px; }

      main[data-layout="sidebar"] .participant-tile {
        flex: 0 0 auto; width: 100%; aspect-ratio: 4/3;
      }

      main[data-layout="sidebar"] .avatar-circle { width: 40px; height: 40px; font-size: 18px; }

      main[data-layout="sidebar"] .content-area {
        display: flex;
        gap: 0; min-height: 0; order: 1;
        flex: 1; min-width: 0;
      }

      main[data-layout="sidebar"] .content-area .presentation-tile {
        flex: 1; min-width: 0; min-height: 0;
      }

      main[data-layout="sidebar"] .content-area .transcription-panel {
        width: var(--sidebar-transcription-w, 300px);
        min-width: 160px; flex-shrink: 0;
      }

      main[data-layout="sidebar"] .spotlight-tile { display: none; }

      /* ── GRID: video tiles as primary content ── */
      main[data-layout="grid"] .workspace-area {
        display: flex;
        flex-direction: column;
        gap: 0; min-height: 0;
      }

      main[data-layout="grid"] .spotlight-area {
        flex: 0 0 auto;
        height: var(--grid-video-h, 240px);
        max-height: 50%; min-height: 80px;
      }

      main[data-layout="grid"] .video-area {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 280px));
        justify-content: center;
        gap: 6px; padding: 4px 0;
        overflow-y: auto;
        height: 100%;
      }

      main[data-layout="grid"] .participant-tile {
        width: 100%; max-width: 280px; aspect-ratio: 16/9;
      }

      main[data-layout="grid"] .avatar-circle { width: 56px; height: 56px; font-size: 24px; }

      main[data-layout="grid"] .content-area {
        display: flex;
        gap: 0; min-height: 0;
        flex: 1;
      }

      main[data-layout="grid"] .content-area .presentation-tile {
        flex: 1; min-width: 0; min-height: 0;
      }

      main[data-layout="grid"] .content-area .transcription-panel {
        width: var(--grid-transcription-w, 320px);
        min-width: 160px; flex-shrink: 0;
      }

      main[data-layout="grid"] .spotlight-tile { display: none; }

      /* ── SPOTLIGHT: active speaker large, others small strip ── */
      main[data-layout="spotlight"] .workspace-area {
        display: flex;
        gap: 0; min-height: 0;
      }

      main[data-layout="spotlight"] .spotlight-area {
        display: flex;
        flex-direction: column;
        gap: 0; min-height: 0;
        width: var(--spotlight-area-w, 60%);
        min-width: 200px; flex-shrink: 0;
      }

      main[data-layout="spotlight"] .spotlight-tile {
        display: block;
        position: relative;
        border-radius: var(--radius);
        background: #111418;
        border: 2px solid transparent;
        overflow: hidden;
        min-height: 200px;
        flex: 1;
        transition: border-color 0.2s ease;
      }

      main[data-layout="spotlight"] .spotlight-tile.speaking {
        border-color: var(--green);
        box-shadow: 0 0 0 1px var(--green), 0 0 12px rgba(52, 168, 83, 0.3);
      }

      main[data-layout="spotlight"] .spotlight-tile video {
        width: 100%; height: 100%; object-fit: cover; display: block;
      }

      main[data-layout="spotlight"] .spotlight-tile .avatar-placeholder {
        display: grid; place-items: center;
        width: 100%; height: 100%;
        background: linear-gradient(135deg, #2d2e30 0%, #1a1b1d 100%);
      }

      main[data-layout="spotlight"] .spotlight-tile .avatar-circle {
        width: 80px; height: 80px; font-size: 36px;
      }

      main[data-layout="spotlight"] .spotlight-tile .participant-label {
        position: absolute; bottom: 8px; left: 8px; right: 8px;
        border-radius: 6px; background: rgba(32, 33, 36, 0.82);
        padding: 5px 10px; font-size: 13px; font-weight: 700; color: #fff;
      }

      main[data-layout="spotlight"] .video-area {
        display: flex; gap: 6px; overflow-x: auto;
        scroll-snap-type: x mandatory;
        height: var(--spotlight-strip-h, 106px);
        min-height: 60px; flex-shrink: 0;
        padding: 4px 0;
      }

      main[data-layout="spotlight"] .video-area::-webkit-scrollbar { height: 4px; }
      main[data-layout="spotlight"] .video-area::-webkit-scrollbar-track { background: transparent; }
      main[data-layout="spotlight"] .video-area::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 4px; }

      main[data-layout="spotlight"] .participant-tile {
        flex: 0 0 auto; width: 130px; height: 100%;
        scroll-snap-align: start;
      }

      main[data-layout="spotlight"] .participant-tile.spotlighted {
        border-color: var(--yellow);
      }

      main[data-layout="spotlight"] .avatar-circle { width: 36px; height: 36px; font-size: 16px; }

      main[data-layout="spotlight"] .content-area {
        display: flex; flex-direction: column; gap: 8px;
        min-height: 0; flex: 1; min-width: 0;
      }

      main[data-layout="spotlight"] .presentation-tile { flex: 1; min-height: 0; }

      main[data-layout="spotlight"] .content-area .transcription-panel {
        max-height: var(--spotlight-transcription-h, 200px);
        min-height: 60px; flex-shrink: 0;
      }

      /* ── Card detail modal ── */
      .card-detail-region {
        position: fixed; inset: 0; z-index: 1200;
        display: none; place-items: center;
        padding: 24px; background: rgba(32, 33, 36, 0.54);
      }

      .card-detail-region.visible { display: grid; }

      .card-detail {
        display: grid; gap: 14px;
        width: min(620px, calc(100vw - 48px));
        max-height: calc(100vh - 48px); overflow: auto;
        border: 1px solid #dde2eb; border-radius: 8px;
        background: #fff; box-shadow: 0 28px 80px rgba(0, 0, 0, 0.42);
        color: #17191f; padding: 18px;
      }

      .card-detail-header {
        display: grid; grid-template-columns: auto minmax(0, 1fr) auto;
        align-items: start; gap: 12px;
      }

      .card-detail-title { display: grid; gap: 5px; min-width: 0; }
      .card-detail-title strong { font-size: 20px; line-height: 1.25; }
      .card-detail-owner { color: #5d6572; font-size: 13px; font-weight: 700; }

      .card-detail-close {
        min-width: 0; border-radius: 6px;
        background: transparent; color: #66707f;
        font-size: 24px; line-height: 1; padding: 2px 6px;
      }

      .comment-preview-details { display: grid; gap: 8px; }
      .comment-preview-detail { display: grid; gap: 3px; }
      .comment-preview-detail-label { color: #6f7785; font-size: 11px; font-weight: 800; letter-spacing: 0.04em; line-height: 1; text-transform: uppercase; }
      .comment-preview-detail-value { color: #3c4043; font-size: 13px; line-height: 1.4; white-space: pre-wrap; }

      /* ── Toast ── */
      .toast-region {
        position: fixed; right: 18px; bottom: 18px; z-index: 1100;
        display: grid; gap: 10px;
        width: min(360px, calc(100vw - 36px)); pointer-events: none;
      }

      .toast {
        border: 1px solid var(--border-strong);
        border-radius: 12px; background: #303134;
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.36);
        color: #fff; font-size: 14px; font-weight: 700;
        line-height: 1.35; padding: 12px 14px;
        animation: toast-in 180ms ease-out;
      }

      /* ── Comment preview ── */
      .comment-preview-region {
        position: fixed; inset: 0; z-index: 1050;
        display: grid; place-items: center; padding: 24px;
        pointer-events: none;
      }

      .comment-preview {
        display: grid; gap: 12px;
        width: min(560px, calc(100vw - 48px));
        border: 1px solid #dde2eb; border-radius: 8px;
        background: #fff; box-shadow: 0 28px 80px rgba(0, 0, 0, 0.42);
        color: #17191f; padding: 18px;
        transform-origin: 50% 60%;
        animation: comment-preview-open 260ms cubic-bezier(0.2, 0.9, 0.2, 1.15);
      }

      .comment-preview.closing { animation: comment-preview-close 220ms ease-in forwards; }
      .comment-preview-meta { justify-self: start; border-radius: 999px; background: #e8f0fe; color: #174ea6; font-size: 12px; font-weight: 800; line-height: 1; padding: 6px 9px; }
      .comment-preview-title { font-size: 18px; line-height: 1.25; }
      .comment-preview-latest { display: grid; gap: 6px; border-radius: 8px; background: #f1f7ff; padding: 10px; }
      .confetti-piece { position: fixed; z-index: 1000; width: 8px; height: 12px; border-radius: 2px; background: var(--confetti-color); pointer-events: none; animation: confetti-pop 1000ms ease-out forwards; }

      /* ── Animations ── */
      @keyframes card-move-wiggle {
        0% { transform: translate3d(0,0,0) rotate(0) scale(1); }
        12% { transform: translate3d(-10px,-12px,0) rotate(-4deg) scale(1.05); }
        24% { transform: translate3d(9px,4px,0) rotate(4deg) scale(1.03); }
        36% { transform: translate3d(-7px,-7px,0) rotate(-3deg) scale(1.04); }
        48% { transform: translate3d(6px,2px,0) rotate(3deg) scale(1.02); }
        62% { transform: translate3d(-4px,-4px,0) rotate(-2deg) scale(1.025); }
        78% { transform: translate3d(3px,1px,0) rotate(1.2deg) scale(1.01); }
        100% { transform: translate3d(0,0,0) rotate(0) scale(1); }
      }

      @keyframes confetti-pop {
        0% { opacity:1; transform: translate3d(-50%,-50%,0) scale(1) rotate(0); }
        70% { opacity:1; }
        100% { opacity:0; transform: translate3d(calc(-50% + var(--dx)),calc(-50% + var(--dy)),0) scale(0.75) rotate(var(--rotation)); }
      }

      @keyframes toast-in { 0% { opacity:0; transform: translate3d(0,8px,0) scale(0.98); } 100% { opacity:1; transform: translate3d(0,0,0) scale(1); } }
      @keyframes comment-preview-open { 0% { opacity:0; transform: translate3d(0,22px,0) scale(0.9) rotate(-1.5deg); } 72% { opacity:1; transform: translate3d(0,-4px,0) scale(1.025) rotate(0.5deg); } 100% { opacity:1; transform: translate3d(0,0,0) scale(1) rotate(0); } }
      @keyframes comment-preview-close { 0% { opacity:1; transform: translate3d(0,0,0) scale(1); } 100% { opacity:0; transform: translate3d(0,-18px,0) scale(0.96) rotate(1deg); } }

      /* ── Resize handles ── */
      .resize-h, .resize-v {
        flex: 0 0 auto;
        background: transparent;
        transition: background 0.15s;
        z-index: 10;
        position: relative;
      }

      .resize-h {
        height: 6px;
        cursor: row-resize;
        margin: -2px 0;
      }

      .resize-v {
        width: 6px;
        cursor: col-resize;
        margin: 0 -2px;
      }

      .resize-h:hover, .resize-v:hover,
      .resize-h.active, .resize-v.active {
        background: var(--accent);
        border-radius: 3px;
      }

      .resize-h::before, .resize-v::before {
        content: '';
        position: absolute;
      }

      .resize-h::before {
        top: -4px; bottom: -4px; left: 0; right: 0;
      }

      .resize-v::before {
        left: -4px; right: -4px; top: 0; bottom: 0;
      }

      /* ── Responsive ── */
      @media (max-width: 1100px) {
        main[data-layout="sidebar"] .spotlight-area { width: var(--sidebar-video-w, 160px); }
        .board { grid-template-columns: repeat(4, minmax(160px, 1fr)); min-width: 688px; }
      }

      @media (max-width: 860px) {
        main { padding: 6px; gap: 4px; }

        main[data-layout="filmstrip"] .content-area,
        main[data-layout="sidebar"] .content-area,
        main[data-layout="grid"] .content-area,
        main[data-layout="spotlight"] .content-area { flex-direction: column; overflow: hidden; }

        main[data-layout="filmstrip"] .content-area .transcription-panel,
        main[data-layout="sidebar"] .content-area .transcription-panel,
        main[data-layout="grid"] .content-area .transcription-panel,
        main[data-layout="spotlight"] .content-area .transcription-panel { width: auto; max-height: 160px; flex-shrink: 0; }

        main[data-layout="sidebar"] .workspace-area { flex-direction: column; }
        main[data-layout="sidebar"] .spotlight-area { order: 0; width: auto; height: auto; }
        main[data-layout="sidebar"] .video-area { flex-direction: row; overflow-x: auto; overflow-y: hidden; width: auto; height: 90px; }
        main[data-layout="sidebar"] .participant-tile { width: 110px; height: 82px; aspect-ratio: auto; }
        main[data-layout="spotlight"] .workspace-area { flex-direction: column; }
        main[data-layout="spotlight"] .spotlight-area { width: auto; }

        .resize-h, .resize-v { display: none; }

        .meeting-bar { grid-template-columns: 1fr; justify-items: center; min-height: 44px; gap: 4px; }
        .controls { order: 0; flex-wrap: wrap; gap: 6px; }
        .log { text-align: center; font-size: 12px; }

        .topbar { padding: 4px 10px; min-height: 32px; }
        h1 { font-size: 12px; }

        .media-btn { width: 40px; height: 40px; }
        button { padding: 8px 12px; font-size: 13px; min-width: 36px; }
      }

      @media (max-width: 640px) {
        .board { grid-template-columns: 1fr; min-width: 0; }

        main[data-layout="filmstrip"] .spotlight-area { height: 80px; min-height: 50px; }
        main[data-layout="filmstrip"] .participant-tile { width: 100px; }

        .layout-group { gap: 1px; }
        .layout-btn { width: 28px; height: 28px; }
        .layout-btn svg { width: 14px; height: 14px; }

        .topbar-right { gap: 4px; }
      }

      @media (max-height: 600px) {
        main { padding: 4px; gap: 4px; }
        .topbar { min-height: 28px; padding: 3px 8px; }
        .meeting-bar { min-height: 40px; }
      }

      @supports (height: 100dvh) {
        main { height: 100dvh; }
      }
    </style>
  </head>
  <body>
    <script>window.__APP_TOKEN__="{{.Token}}";</script>
    <main data-layout="filmstrip">
      <header class="topbar">
        <span class="topbar-pill" aria-hidden="true">K</span>
        <div>
          <h1>Realtime Kanban Meeting Assistant</h1>
          <p class="status" id="status">Not connected</p>
        </div>
        <div class="topbar-right">
          <div class="layout-group" id="layoutGroup" role="radiogroup" aria-label="Video layout">
            <button class="layout-btn active" data-layout="filmstrip" title="Filmstrip" aria-label="Filmstrip layout">
              <svg viewBox="0 0 18 18"><rect x="1" y="1" width="3.5" height="3" rx="0.5"/><rect x="5.5" y="1" width="3.5" height="3" rx="0.5"/><rect x="10" y="1" width="3.5" height="3" rx="0.5"/><rect x="14.5" y="1" width="2.5" height="3" rx="0.5"/><rect x="1" y="5.5" width="16" height="11.5" rx="1" opacity="0.35"/></svg>
            </button>
            <button class="layout-btn" data-layout="sidebar" title="Sidebar" aria-label="Sidebar layout">
              <svg viewBox="0 0 18 18"><rect x="1" y="1" width="12" height="16" rx="1" opacity="0.35"/><rect x="14" y="1" width="3" height="3.5" rx="0.5"/><rect x="14" y="5.5" width="3" height="3.5" rx="0.5"/><rect x="14" y="10" width="3" height="3.5" rx="0.5"/><rect x="14" y="14.5" width="3" height="2.5" rx="0.5"/></svg>
            </button>
            <button class="layout-btn" data-layout="grid" title="Grid" aria-label="Grid layout">
              <svg viewBox="0 0 18 18"><rect x="1" y="1" width="7.5" height="5.5" rx="0.7"/><rect x="9.5" y="1" width="7.5" height="5.5" rx="0.7"/><rect x="1" y="7.5" width="7.5" height="5.5" rx="0.7"/><rect x="9.5" y="7.5" width="7.5" height="5.5" rx="0.7"/><rect x="1" y="14" width="16" height="3" rx="0.7" opacity="0.35"/></svg>
            </button>
            <button class="layout-btn" data-layout="spotlight" title="Spotlight" aria-label="Spotlight layout">
              <svg viewBox="0 0 18 18"><rect x="1" y="1" width="12" height="12.5" rx="1"/><rect x="14" y="1" width="3" height="3.5" rx="0.5" opacity="0.5"/><rect x="14" y="5.5" width="3" height="3.5" rx="0.5" opacity="0.5"/><rect x="14" y="10" width="3" height="3.5" rx="0.5" opacity="0.5"/><rect x="1" y="14.5" width="16" height="2.5" rx="0.7" opacity="0.35"/></svg>
            </button>
          </div>
        </div>
      </header>

      <div class="workspace-area">
        <div class="spotlight-area">
          <div id="spotlightTile" class="spotlight-tile" style="display:none"></div>
          <section id="videoStrip" class="video-area" aria-label="Participants"></section>
        </div>

        <div class="content-area">
          <section class="presentation-tile" aria-label="Presented Kanban board">
            <div class="board-surface">
              <section id="board" class="board" aria-label="Kanban board"></section>
            </div>
          </section>

          <aside class="transcription-panel" aria-label="Live transcription">
            <div class="transcription-header">
              <span id="liveDot" class="dot"></span>
              <span>Transcription</span>
            </div>
            <div id="transcriptionScroll" class="transcription-scroll"></div>
          </aside>
        </div>
      </div>

      <footer class="meeting-bar">
        <p id="log" class="log" aria-live="polite">
          <span id="participantCount" class="participant-count"></span>
          Team meeting
        </p>
        <div class="controls">
          <button id="join" class="primary" type="button">Join room</button>
          <button id="toggleMic" class="media-btn" type="button" disabled aria-label="Toggle microphone" title="Mic">
            <svg viewBox="0 0 24 24"><path id="micIcon" d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
          </button>
          <button id="toggleCam" class="media-btn" type="button" disabled aria-label="Toggle camera" title="Camera">
            <svg viewBox="0 0 24 24"><path id="camIcon" d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
          </button>
          <button id="leave" type="button" disabled>Leave</button>
          <button id="confirmBoard" type="button" disabled>Confirm Board</button>
        </div>
        <span aria-hidden="true"></span>
      </footer>
    </main>

    <div id="toastRegion" class="toast-region" aria-live="polite" aria-atomic="true"></div>
    <div id="commentPreviewRegion" class="comment-preview-region" aria-live="polite" aria-atomic="true"></div>
    <div id="cardDetailRegion" class="card-detail-region"></div>

    <script src="https://cdn.jsdelivr.net/npm/livekit-client@2.19.0/dist/livekit-client.umd.min.js"
            integrity="sha384-4mvXH43KU6z6VglCgy9AF2YBxW2U6M++EIf5rAAKg/BDjOcaZ/zwG3cSjGdV4+MN"
            crossorigin="anonymous"></script>
    <script>
      const statuses = ['Backlog', 'In Progress', 'Blocked', 'Done']
      const mainEl = document.querySelector('main')
      const boardEl = document.getElementById('board')
      const statusEl = document.getElementById('status')
      const logEl = document.getElementById('log')
      const joinButton = document.getElementById('join')
      const leaveButton = document.getElementById('leave')
      const confirmBoardButton = document.getElementById('confirmBoard')
      const toggleMicBtn = document.getElementById('toggleMic')
      const toggleCamBtn = document.getElementById('toggleCam')
      const transcriptionScroll = document.getElementById('transcriptionScroll')
      const liveDot = document.getElementById('liveDot')
      const toastRegion = document.getElementById('toastRegion')
      const commentPreviewRegion = document.getElementById('commentPreviewRegion')
      const cardDetailRegion = document.getElementById('cardDetailRegion')
      const videoStrip = document.getElementById('videoStrip')
      const spotlightTile = document.getElementById('spotlightTile')
      const participantCountEl = document.getElementById('participantCount')
      const layoutGroup = document.getElementById('layoutGroup')

      let cards = []
      let room
      let ws
      let hasBoardSnapshot = false
      let commentPreviewTimer
      let micEnabled = true
      let camEnabled = true
      let localIdentity = 'User'
      let currentLayout = localStorage.getItem('kanban-layout') || 'filmstrip'
      let spotlightIdentity = null
      const cardSnapshots = new Map()
      const activeSpeakers = new Set()

      const AVATAR_COLORS = [
        '#4285f4','#ea4335','#fbbc04','#34a853','#a142f4',
        '#00acc1','#ff7043','#9c27b0','#00897b','#c2185b',
      ]

      mainEl.dataset.layout = currentLayout
      layoutGroup.querySelector(`[data-layout="${currentLayout}"]`)?.classList.add('active')

      layoutGroup.addEventListener('click', e => {
        const btn = e.target.closest('[data-layout]')
        if (!btn) return
        const layout = btn.dataset.layout
        if (layout === currentLayout) return
        currentLayout = layout
        mainEl.dataset.layout = layout
        localStorage.setItem('kanban-layout', layout)
        layoutGroup.querySelectorAll('.layout-btn').forEach(b => b.classList.remove('active'))
        btn.classList.add('active')
        applyPanelSizes()
        setupResizeHandles()
        updateSpotlight()
      })

      joinButton.addEventListener('click', joinRoom)
      leaveButton.addEventListener('click', leaveRoom)
      confirmBoardButton.addEventListener('click', confirmBoard)
      toggleMicBtn.addEventListener('click', toggleMic)
      toggleCamBtn.addEventListener('click', toggleCam)
      window.addEventListener('beforeunload', leaveRoom)
      window.addEventListener('keydown', e => { if (e.key === 'Escape') closeCardDetail() })
      cardDetailRegion.addEventListener('click', e => { if (e.target === cardDetailRegion) closeCardDetail() })

      renderBoard()

      function avatarColor(name) {
        let h = 0
        for (let i = 0; i < name.length; i++) h = ((h << 5) - h + name.charCodeAt(i)) | 0
        return AVATAR_COLORS[Math.abs(h) % AVATAR_COLORS.length]
      }

      function avatarInitial(name) { return (name || '?').charAt(0).toUpperCase() }

      /* ── Participant tiles ── */

      function createParticipantTile(identity, isLocal) {
        const tile = document.createElement('div')
        tile.className = 'participant-tile' + (isLocal ? ' local' : '')
        tile.id = `tile-${CSS.escape(identity)}`
        tile.dataset.identity = identity

        const placeholder = document.createElement('div')
        placeholder.className = 'avatar-placeholder'
        const circle = document.createElement('div')
        circle.className = 'avatar-circle'
        circle.style.background = avatarColor(identity)
        circle.textContent = avatarInitial(identity)
        placeholder.appendChild(circle)
        tile.appendChild(placeholder)

        const label = document.createElement('div')
        label.className = 'participant-label'
        const nameSpan = document.createElement('span')
        nameSpan.className = 'participant-name'
        nameSpan.textContent = isLocal ? `${identity} (you)` : identity
        label.appendChild(nameSpan)

        const muteIcon = document.createElementNS('http://www.w3.org/2000/svg', 'svg')
        muteIcon.setAttribute('viewBox', '0 0 24 24')
        muteIcon.classList.add('participant-muted-icon', 'hidden')
        muteIcon.innerHTML = '<path fill="#ea4335" d="M19 11h-1.7c0 .74-.16 1.43-.43 2.05l1.23 1.23c.56-.98.9-2.09.9-3.28zm-4.02.17c0-.06.02-.11.02-.17V5c0-1.66-1.34-3-3-3S9 3.34 9 5v.18l5.98 5.99zM4.27 3L3 4.27l6.01 6.01V11c0 1.66 1.33 3 2.99 3 .22 0 .44-.03.65-.08l1.66 1.66c-.71.33-1.5.52-2.31.52-2.76 0-5.3-2.1-5.3-5.1H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c.91-.13 1.77-.45 2.54-.9L19.73 21 21 19.73 4.27 3z"/>'
        label.appendChild(muteIcon)
        tile.appendChild(label)
        return tile
      }

      function getTile(identity) { return document.getElementById(`tile-${CSS.escape(identity)}`) }

      function attachVideoToTile(tile, track) {
        const existing = tile.querySelector('video')
        if (existing) existing.remove()
        const placeholder = tile.querySelector('.avatar-placeholder')
        if (placeholder) placeholder.style.display = 'none'
        const el = track.attach()
        el.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block'
        if (tile.classList.contains('local')) el.style.transform = 'scaleX(-1)'
        tile.insertBefore(el, tile.querySelector('.participant-label'))
      }

      function detachVideoFromTile(tile) {
        const video = tile.querySelector('video')
        if (video) video.remove()
        const placeholder = tile.querySelector('.avatar-placeholder')
        if (placeholder) placeholder.style.display = ''
      }

      function setTileMuted(identity, muted) {
        const tile = getTile(identity)
        if (!tile) return
        const icon = tile.querySelector('.participant-muted-icon')
        if (icon) icon.classList.toggle('hidden', !muted)
      }

      function removeTile(identity) {
        const tile = getTile(identity)
        if (tile) tile.remove()
        if (spotlightIdentity === identity) updateSpotlight()
        updateParticipantCount()
      }

      function updateParticipantCount() {
        const count = videoStrip.children.length
        participantCountEl.textContent = count > 0 ? `${count} participant${count !== 1 ? 's' : ''} ·` : ''
      }

      function updateSpeakerHighlights(speakers) {
        activeSpeakers.clear()
        for (const sp of speakers) activeSpeakers.add(sp.identity)
        for (const tile of videoStrip.children) {
          tile.classList.toggle('speaking', activeSpeakers.has(tile.dataset.identity))
        }
        updateSpotlight()
      }

      /* ── Spotlight logic ── */

      function updateSpotlight() {
        if (currentLayout !== 'spotlight') {
          spotlightTile.style.display = 'none'
          spotlightTile.replaceChildren()
          videoStrip.querySelectorAll('.spotlighted').forEach(t => t.classList.remove('spotlighted'))
          spotlightIdentity = null
          return
        }

        let target = null
        for (const id of activeSpeakers) {
          if (id !== 'nova-sonic-agent') { target = id; break }
        }
        if (!target && videoStrip.children.length > 0) {
          target = videoStrip.children[0].dataset.identity
        }

        if (!target) {
          spotlightTile.style.display = 'none'
          spotlightTile.replaceChildren()
          spotlightIdentity = null
          return
        }

        if (target === spotlightIdentity) return
        spotlightIdentity = target

        videoStrip.querySelectorAll('.spotlighted').forEach(t => t.classList.remove('spotlighted'))
        const smallTile = getTile(target)
        if (smallTile) smallTile.classList.add('spotlighted')

        spotlightTile.style.display = ''
        spotlightTile.replaceChildren()
        spotlightTile.classList.toggle('speaking', activeSpeakers.has(target))

        const placeholder = document.createElement('div')
        placeholder.className = 'avatar-placeholder'
        const circle = document.createElement('div')
        circle.className = 'avatar-circle'
        circle.style.background = avatarColor(target)
        circle.textContent = avatarInitial(target)
        placeholder.appendChild(circle)
        spotlightTile.appendChild(placeholder)

        const label = document.createElement('div')
        label.className = 'participant-label'
        const nameSpan = document.createElement('span')
        nameSpan.className = 'participant-name'
        nameSpan.textContent = target === localIdentity ? `${target} (you)` : target
        label.appendChild(nameSpan)
        spotlightTile.appendChild(label)

        if (room) {
          let videoTrack = null
          if (target === localIdentity) {
            for (const pub of room.localParticipant.trackPublications.values()) {
              if (pub.track && (pub.track.kind === LivekitClient.Track.Kind.Video ||
                  pub.track.source === LivekitClient.Track.Source.Camera)) {
                videoTrack = pub.track; break
              }
            }
          } else {
            const rp = room.remoteParticipants.get(target)
            if (rp) {
              for (const pub of rp.trackPublications.values()) {
                if (pub.track && pub.kind === LivekitClient.Track.Kind.Video && !pub.isMuted) {
                  videoTrack = pub.track; break
                }
              }
            }
          }
          if (videoTrack) {
            placeholder.style.display = 'none'
            const el = videoTrack.attach()
            el.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block'
            if (target === localIdentity) el.style.transform = 'scaleX(-1)'
            spotlightTile.insertBefore(el, label)
          }
        }
      }

      /* ── Join / Leave ── */

      async function joinRoom() {
        joinButton.disabled = true
        setStatus('Connecting...')
        localIdentity = prompt('Enter your name:', 'User') || 'User'

        try {
          const tokenResp = await fetch(`/livekit-token?identity=${encodeURIComponent(localIdentity)}&token=${encodeURIComponent(window.__APP_TOKEN__ || '')}`)
          if (!tokenResp.ok) throw new Error(`Token request failed: ${tokenResp.status}`)
          const tokenData = await tokenResp.json()
          const token = tokenData.token || tokenData
          const livekitURL = `${window.location.protocol === 'https:' ? 'wss' : 'ws'}://${window.location.hostname}:7880`

          room = new LivekitClient.Room({
            adaptiveStream: true, dynacast: true,
            videoCaptureDefaults: { resolution: LivekitClient.VideoPresets.h360.resolution },
          })

          room.on(LivekitClient.RoomEvent.Connected, () => {
            setStatus(`Connected as ${localIdentity}`)
            leaveButton.disabled = false
            confirmBoardButton.disabled = false
            toggleMicBtn.disabled = false
            toggleCamBtn.disabled = false
            liveDot.classList.add('live')
            videoStrip.appendChild(createParticipantTile(localIdentity, true))
            for (const p of room.remoteParticipants.values()) addRemoteParticipantTile(p)
            updateParticipantCount()
            updateSpotlight()
          })

          room.on(LivekitClient.RoomEvent.Disconnected, () => leaveRoom())

          room.on(LivekitClient.RoomEvent.ParticipantConnected, p => {
            addRemoteParticipantTile(p)
            updateParticipantCount()
            updateSpotlight()
          })

          room.on(LivekitClient.RoomEvent.ParticipantDisconnected, p => removeTile(p.identity))

          room.on(LivekitClient.RoomEvent.TrackSubscribed, (track, pub, participant) => {
            const tile = getTile(participant.identity)
            if (track.kind === LivekitClient.Track.Kind.Video) {
              if (tile) attachVideoToTile(tile, track)
              updateSpotlight()
            } else if (track.kind === LivekitClient.Track.Kind.Audio) {
              const el = track.attach()
              el.id = `audio-${CSS.escape(participant.identity)}`
              el.style.display = 'none'
              document.body.appendChild(el)
            }
          })

          room.on(LivekitClient.RoomEvent.TrackUnsubscribed, (track, pub, participant) => {
            if (track.kind === LivekitClient.Track.Kind.Video) {
              const tile = getTile(participant.identity)
              if (tile) detachVideoFromTile(tile)
              updateSpotlight()
            } else if (track.kind === LivekitClient.Track.Kind.Audio) {
              track.detach().forEach(el => el.remove())
            }
          })

          room.on(LivekitClient.RoomEvent.TrackMuted, (pub, participant) => {
            if (pub.kind === LivekitClient.Track.Kind.Audio) setTileMuted(participant.identity, true)
            if (pub.kind === LivekitClient.Track.Kind.Video) {
              const tile = getTile(participant.identity)
              if (tile) detachVideoFromTile(tile)
            }
          })

          room.on(LivekitClient.RoomEvent.TrackUnmuted, (pub, participant) => {
            if (pub.kind === LivekitClient.Track.Kind.Audio) setTileMuted(participant.identity, false)
          })

          room.on(LivekitClient.RoomEvent.ActiveSpeakersChanged, speakers => updateSpeakerHighlights(speakers))

          room.on(LivekitClient.RoomEvent.LocalTrackPublished, (pub) => {
            if (pub.kind === LivekitClient.Track.Kind.Video ||
                (pub.track && pub.track.kind === LivekitClient.Track.Kind.Video)) {
              const tile = getTile(localIdentity)
              const track = pub.track || pub.videoTrack
              if (tile && track) attachVideoToTile(tile, track)
              updateSpotlight()
            }
          })

          room.on(LivekitClient.RoomEvent.LocalTrackUnpublished, (pub) => {
            if (pub.kind === LivekitClient.Track.Kind.Video ||
                (pub.track && pub.track.kind === LivekitClient.Track.Kind.Video)) {
              const tile = getTile(localIdentity)
              if (tile) detachVideoFromTile(tile)
              updateSpotlight()
            }
          })

          await room.connect(livekitURL, token)
          await room.localParticipant.setMicrophoneEnabled(true)
          micEnabled = true; toggleMicBtn.classList.remove('off')

          try {
            await room.localParticipant.setCameraEnabled(true)
            camEnabled = true; toggleCamBtn.classList.remove('off')
          } catch (camErr) {
            console.warn('Camera unavailable:', camErr)
            camEnabled = false; toggleCamBtn.classList.add('off')
          }
          attachLocalVideoIfAvailable()

          const scheme = window.location.protocol === 'https:' ? 'wss' : 'ws'
          ws = new WebSocket(`${scheme}://${window.location.host}/websocket`)
          ws.onopen = () => setStatus(`Connected as ${localIdentity}`)
          ws.onmessage = e => { try { handleSignal(JSON.parse(e.data)) } catch(err) { console.warn('Invalid WS message', err) } }
          ws.onclose = () => leaveRoom()
          ws.onerror = () => setLog('WebSocket error')
        } catch (error) {
          setLog(error.message || String(error))
          leaveRoom()
        }
      }

      function addRemoteParticipantTile(participant) {
        if (getTile(participant.identity)) return
        const tile = createParticipantTile(participant.identity, false)
        videoStrip.appendChild(tile)
        for (const pub of participant.trackPublications.values()) {
          if (pub.track && pub.kind === LivekitClient.Track.Kind.Video && !pub.isMuted) attachVideoToTile(tile, pub.track)
          if (pub.kind === LivekitClient.Track.Kind.Audio && pub.isMuted) setTileMuted(participant.identity, true)
        }
      }

      async function toggleMic() {
        if (!room) return
        micEnabled = !micEnabled
        await room.localParticipant.setMicrophoneEnabled(micEnabled)
        toggleMicBtn.classList.toggle('off', !micEnabled)
        setTileMuted(localIdentity, !micEnabled)
      }

      async function toggleCam() {
        if (!room) return
        camEnabled = !camEnabled
        try { await room.localParticipant.setCameraEnabled(camEnabled) } catch (e) { camEnabled = false }
        toggleCamBtn.classList.toggle('off', !camEnabled)
        if (!camEnabled) {
          const tile = getTile(localIdentity)
          if (tile) detachVideoFromTile(tile)
        } else {
          attachLocalVideoIfAvailable()
        }
        updateSpotlight()
      }

      function attachLocalVideoIfAvailable() {
        if (!room) return
        const tile = getTile(localIdentity)
        if (!tile) return
        for (const pub of room.localParticipant.trackPublications.values()) {
          if (pub.track && (pub.track.kind === LivekitClient.Track.Kind.Video ||
              pub.track.source === LivekitClient.Track.Source.Camera)) {
            attachVideoToTile(tile, pub.track)
            return
          }
        }
      }

      function leaveRoom() {
        joinButton.disabled = false
        leaveButton.disabled = true
        confirmBoardButton.disabled = true
        toggleMicBtn.disabled = true; toggleCamBtn.disabled = true
        toggleMicBtn.classList.remove('off'); toggleCamBtn.classList.remove('off')
        liveDot.classList.remove('live')
        videoStrip.replaceChildren()
        spotlightTile.style.display = 'none'; spotlightTile.replaceChildren()
        spotlightIdentity = null
        participantCountEl.textContent = ''
        activeSpeakers.clear()
        if (ws && ws.readyState !== WebSocket.CLOSED) ws.close()
        ws = undefined
        if (room) room.disconnect()
        room = undefined
        document.querySelectorAll('audio[id^="audio-"]').forEach(el => el.remove())
        setStatus('Not connected')
      }

      /* ── Signaling / Kanban ── */

      function handleSignal(msg) { try { if (msg.event === 'kanban') handleKanbanMessage(JSON.parse(msg.data)) } catch(e) { console.warn('Invalid signal message', e) } }

      function handleKanbanMessage(msg) {
        switch (msg.event) {
          case 'board':
            cards = Array.isArray(msg.data?.cards) ? msg.data.cards : []
            { const ch = cardChanges(cards); renderBoard(ch); ch.messages.forEach(showToast); ch.commentPreviews.forEach(showCommentPreview) }
            break
          case 'status': setLog(String(msg.data || '')); break
          case 'transcription': addTranscriptEntry(msg.data); break
          case 'highlight': highlightCard(msg.data?.card_id); break
          case 'close_detail': closeCardDetail(); break
        }
      }

      function highlightCard(cardId) { if (!cardId) return; const c = cards.find(c => c.id === cardId); if (c) showCardDetail(c) }

      function addTranscriptEntry(data) {
        if (!data) return
        const entry = document.createElement('div'); entry.className = 'transcript-entry'
        const speaker = document.createElement('div'); speaker.className = 'speaker'
        const role = (data.role || '').toLowerCase()
        speaker.classList.add(role === 'assistant' ? 'assistant-speaker' : 'user-speaker')
        const now = new Date()
        const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' })
        const nameSpan = document.createElement('span')
        nameSpan.textContent = data.speaker || (role === 'assistant' ? 'Assistant' : 'User')
        const timeSpan = document.createElement('span')
        timeSpan.className = 'timestamp'
        timeSpan.textContent = timeStr
        speaker.append(nameSpan, timeSpan)
        const text = document.createElement('div'); text.className = 'text'; text.textContent = data.text || ''
        entry.append(speaker, text)
        transcriptionScroll.appendChild(entry)
        transcriptionScroll.scrollTop = transcriptionScroll.scrollHeight
      }

      function confirmBoard() {
        if (!ws || ws.readyState !== WebSocket.OPEN) return
        ws.send(JSON.stringify({ event: 'confirm_board', data: '' }))
        confirmBoardButton.classList.add('confirmed'); confirmBoardButton.textContent = 'Confirmed'
        setTimeout(() => { confirmBoardButton.classList.remove('confirmed'); confirmBoardButton.textContent = 'Confirm Board' }, 3000)
      }

      /* ── Board rendering ── */

      function renderBoard(changes = { moved: new Set(), completed: new Set(), messages: [], commentPreviews: [] }) {
        boardEl.replaceChildren(...statuses.map(status => {
          const col = document.createElement('section'); col.className = 'column'; col.setAttribute('aria-label', `${status} cards`)
          const header = document.createElement('header'); const title = document.createElement('h2'); title.textContent = status
          const count = document.createElement('span'); count.className = 'count'; count.textContent = String(cards.filter(c => c.status === status).length)
          header.append(title, count)
          const stack = document.createElement('div'); stack.className = 'stack'
          const colCards = cards.filter(c => c.status === status)
          if (colCards.length === 0) { const e = document.createElement('div'); e.className = 'empty'; e.textContent = 'Empty'; stack.appendChild(e) }
          else stack.append(...colCards.map(c => renderCard(c, changes.moved.has(c.id), changes.completed.has(c.id))))
          col.append(header, stack); return col
        }))
      }

      function renderCard(card, moved = false, completed = false) {
        const article = document.createElement('article'); article.className = 'card'; article.tabIndex = 0
        article.setAttribute('data-card-id', card.id); article.setAttribute('role', 'button')
        article.setAttribute('aria-label', `Open card details for ${card.title || 'untitled card'}`)
        article.addEventListener('click', () => showCardDetail(card))
        article.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); showCardDetail(card) } })
        if (moved) requestAnimationFrame(() => { article.classList.add('moved'); setTimeout(() => article.classList.remove('moved'), 1200) })
        if (completed) requestAnimationFrame(() => fireConfetti(article))
        const heading = document.createElement('div'); heading.className = 'card-heading'
        const title = document.createElement('strong'); title.textContent = card.title
        heading.append(title, renderOwnerAvatar(card)); article.appendChild(heading)
        if (card.tags?.length > 0) {
          const tags = document.createElement('ul'); tags.className = 'tags'
          tags.append(...card.tags.map(tag => { const li = document.createElement('li'); const c = tagColors(tag); li.style.setProperty('--tag-bg', c.background); li.style.setProperty('--tag-color', c.color); li.textContent = tag; return li }))
          article.appendChild(tags)
        }
        return article
      }

      function showCardDetail(card) {
        if (!card) return; const owner = cardOwner(card)
        const panel = document.createElement('article'); panel.className = 'card-detail'; panel.setAttribute('role', 'dialog'); panel.setAttribute('aria-modal', 'true')
        const header = document.createElement('header'); header.className = 'card-detail-header'
        const tg = document.createElement('div'); tg.className = 'card-detail-title'
        const t = document.createElement('strong'); t.textContent = card.title || 'Untitled card'
        const ow = document.createElement('span'); ow.className = 'card-detail-owner'; ow.textContent = `Owner: ${owner.name}`
        tg.append(t, ow)
        const cb = document.createElement('button'); cb.className = 'card-detail-close'; cb.type = 'button'; cb.textContent = 'x'; cb.addEventListener('click', closeCardDetail)
        header.append(renderOwnerAvatar(card, { large: true }), tg, cb)
        const details = document.createElement('div'); details.className = 'comment-preview-details'
        details.appendChild(renderPreviewDetail('Status', card.status || 'Unassigned'))
        details.appendChild(renderPreviewDetail('Card ID', card.id || 'No card id'))
        details.appendChild(renderPreviewDetail('Owner', owner.name))
        details.appendChild(renderPreviewDetail('Tags', card.tags?.length > 0 ? renderTagList(card) : 'No tags'))
        details.appendChild(renderPreviewDetail('Notes', card.notes || 'No notes yet.'))
        panel.append(header, details)
        cardDetailRegion.replaceChildren(panel); cardDetailRegion.classList.add('visible'); cb.focus()
      }

      function closeCardDetail() { cardDetailRegion.classList.remove('visible'); cardDetailRegion.replaceChildren() }

      /* ── Helpers ── */

      function renderOwnerAvatar(card, opts = {}) {
        const owner = cardOwner(card); const av = document.createElement('span')
        av.className = `owner-avatar${opts.large ? ' large' : ''}`; av.title = `Owner: ${owner.name}`
        av.appendChild(renderIdenticon(owner.name)); return av
      }

      function cardOwner(card) {
        const owners = ['Avery Chen','Blake Stone','Casey Morgan','Dana Patel','Emery Brooks','Finley Rao','Harper Kim','Jordan Lee']
        return { name: owners[hashString(String(card?.id || card?.title || 'kanban-card')) % owners.length] }
      }

      function renderIdenticon(seed) {
        const ns = 'http://www.w3.org/2000/svg'; const svg = document.createElementNS(ns, 'svg'); svg.setAttribute('viewBox', '0 0 5 5'); svg.setAttribute('aria-hidden', 'true')
        const bg = document.createElementNS(ns, 'rect'); bg.setAttribute('width', '5'); bg.setAttribute('height', '5'); bg.setAttribute('fill', '#f6f8fa'); svg.appendChild(bg)
        const ph = hashString(`${seed}:pattern`); const color = `hsl(${hashString(`${seed}:color`) % 360} 54% 44%)`; let filled = 0
        for (let y = 0; y < 5; y++) for (let x = 0; x < 3; x++) { if (((ph >>> (y*3+x)) & 1) === 0) continue; addCell(svg, x, y, color); filled++; if (x !== 2) addCell(svg, 4-x, y, color) }
        if (filled === 0) addCell(svg, 2, 2, color); return svg
      }

      function addCell(svg, x, y, color) {
        const r = document.createElementNS('http://www.w3.org/2000/svg', 'rect')
        r.setAttribute('x', x); r.setAttribute('y', y); r.setAttribute('width', '1'); r.setAttribute('height', '1'); r.setAttribute('fill', color); svg.appendChild(r)
      }

      function hashString(v) { let h = 2166136261; const t = String(v || ''); for (let i = 0; i < t.length; i++) { h ^= t.charCodeAt(i); h = Math.imul(h, 16777619) } return h >>> 0 }

      function renderTagList(card) {
        const tags = document.createElement('ul'); tags.className = 'tags'
        tags.append(...(card.tags || []).map(tag => { const li = document.createElement('li'); const c = tagColors(tag); li.style.setProperty('--tag-bg', c.background); li.style.setProperty('--tag-color', c.color); li.textContent = tag; return li }))
        return tags
      }

      function renderPreviewDetail(labelText, value) {
        const d = document.createElement('div'); d.className = 'comment-preview-detail'
        const l = document.createElement('span'); l.className = 'comment-preview-detail-label'; l.textContent = labelText
        let v; if (value instanceof Node) v = value; else { v = document.createElement('p'); v.className = 'comment-preview-detail-value'; v.textContent = String(value) }
        d.append(l, v); return d
      }

      function cardChanges(nextCards) {
        const moved = new Set(), completed = new Set(), messages = [], commentPreviews = [], nextIds = new Set(), shouldToast = hasBoardSnapshot
        for (const c of nextCards) {
          nextIds.add(c.id); const prev = cardSnapshots.get(c.id)
          if (!prev) { if (shouldToast) messages.push(`Created "${c.title}" in ${c.status}`); cardSnapshots.set(c.id, cardSnapshot(c)); continue }
          if (prev.status !== c.status) { moved.add(c.id); if (c.status === 'Done') completed.add(c.id); if (shouldToast) messages.push(`Moved "${c.title}" to ${c.status}`) }
          if (prev.title !== c.title && shouldToast) messages.push(`Renamed "${prev.title}" to "${c.title}"`)
          if (!sameTags(prev.tags, c.tags || []) && shouldToast) messages.push(`Updated tags on "${c.title}"`)
          if (prev.notes !== (c.notes || '') && shouldToast) { const cm = addedComment(prev.notes, c.notes || ''); messages.push(cm ? `Added comment to "${c.title}"` : `Updated "${c.title}"`); if (cm) commentPreviews.push({ card: cardSnapshot(c), comment: cm }) }
          cardSnapshots.set(c.id, cardSnapshot(c))
        }
        for (const [id, prev] of cardSnapshots.entries()) { if (!nextIds.has(id)) { if (shouldToast) messages.push(`Deleted "${prev.title}"`); cardSnapshots.delete(id) } }
        hasBoardSnapshot = true; return { moved, completed, messages, commentPreviews }
      }

      function cardSnapshot(c) { return { id: c.id || '', title: c.title || '', status: c.status || '', notes: c.notes || '', tags: Array.isArray(c.tags) ? [...c.tags] : [] } }
      function sameTags(a, b) { return a.length === b.length && a.every((t, i) => t === b[i]) }
      function addedComment(p, n) { const a = String(p||'').trim(), b = String(n||'').trim(); if (!b || b === a) return ''; if (a && b.startsWith(a)) return b.slice(a.length).replace(/^[\s:;,.|-]+/,'').trim() || b; return b }

      function showToast(msg) {
        if (!msg) return; const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg; toastRegion.appendChild(t)
        while (toastRegion.children.length > 4) toastRegion.firstElementChild.remove(); setTimeout(() => t.remove(), 4200)
      }

      function showCommentPreview(preview) {
        if (!preview?.comment) return; clearTimeout(commentPreviewTimer)
        const panel = document.createElement('article'); panel.className = 'comment-preview'
        const meta = document.createElement('span'); meta.className = 'comment-preview-meta'; meta.textContent = `${preview.card.status || 'Card'} card`
        const title = document.createElement('strong'); title.className = 'comment-preview-title'; title.textContent = preview.card.title || 'Untitled card'
        const details = document.createElement('div'); details.className = 'comment-preview-details'
        details.appendChild(renderPreviewDetail('Status', preview.card.status || 'Unassigned'))
        details.appendChild(renderPreviewDetail('Card ID', preview.card.id || 'No card id'))
        details.appendChild(renderPreviewDetail('Owner', cardOwner(preview.card).name))
        details.appendChild(renderPreviewDetail('Tags', preview.card.tags?.length > 0 ? renderTagList(preview.card) : 'No tags'))
        details.appendChild(renderPreviewDetail('Notes', preview.card.notes || 'No notes yet.'))
        const latest = document.createElement('div'); latest.className = 'comment-preview-latest'
        latest.appendChild(renderPreviewDetail('Latest comment', preview.comment))
        const ph = document.createElement('div'); ph.className = 'card-detail-header'
        const pt = document.createElement('div'); pt.className = 'card-detail-title'
        const ow = document.createElement('span'); ow.className = 'card-detail-owner'; ow.textContent = `Owner: ${cardOwner(preview.card).name}`
        pt.append(title, ow); ph.append(renderOwnerAvatar(preview.card, { large: true }), pt)
        panel.append(meta, ph, details, latest); commentPreviewRegion.replaceChildren(panel)
        commentPreviewTimer = setTimeout(() => { if (panel.parentElement === commentPreviewRegion) { panel.classList.add('closing'); panel.addEventListener('animationend', () => panel.remove(), { once: true }) } }, 4200)
      }

      function fireConfetti(anchor) {
        const rect = anchor.getBoundingClientRect(), ox = rect.left + rect.width/2, oy = rect.top + Math.min(rect.height/2, 48)
        const colors = ['#1a73e8','#34a853','#fbbc04','#ea4335','#a142f4','#00acc1']
        for (let i = 0; i < 24; i++) {
          const p = document.createElement('span'), angle = (Math.PI*2*i)/24, dist = 46+Math.random()*58, drift = (Math.random()-0.5)*42
          p.className = 'confetti-piece'; p.style.left = `${ox}px`; p.style.top = `${oy}px`
          p.style.setProperty('--dx', `${Math.cos(angle)*dist+drift}px`); p.style.setProperty('--dy', `${Math.sin(angle)*dist+42+Math.random()*28}px`)
          p.style.setProperty('--rotation', `${Math.random()*720-360}deg`); p.style.setProperty('--confetti-color', colors[i%colors.length])
          document.body.appendChild(p); setTimeout(() => p.remove(), 1050)
        }
      }

      function tagColors(tag) { let h = 0; for (const ch of String(tag)) h = ((h<<5)-h+ch.charCodeAt(0))|0; const hue = Math.abs(h)%360; return { background: `hsl(${hue} 78% 90%)`, color: `hsl(${hue} 72% 26%)` } }
      function setStatus(msg) { statusEl.textContent = msg }
      function setLog(msg) { logEl.lastChild.textContent = msg }

      /* ── Resize handles ── */

      const PANEL_SIZES_KEY = 'kanban-panel-sizes'
      const workspaceArea = document.querySelector('.workspace-area')
      const contentArea = document.querySelector('.content-area')
      const spotlightArea = document.querySelector('.spotlight-area')

      function loadPanelSizes() {
        try { return JSON.parse(localStorage.getItem(PANEL_SIZES_KEY)) || {} } catch { return {} }
      }

      function savePanelSizes() {
        const all = loadPanelSizes()
        const ws = workspaceArea.style
        const ca = contentArea.style
        const sa = spotlightArea.style
        switch (currentLayout) {
          case 'filmstrip':
            all.filmstrip = {
              videoHeight: parseInt(sa.getPropertyValue('--filmstrip-video-h')) || 128,
              transcriptionWidth: parseInt(ca.getPropertyValue('--filmstrip-transcription-w')) || 340,
            }; break
          case 'sidebar':
            all.sidebar = {
              videoWidth: parseInt(sa.getPropertyValue('--sidebar-video-w')) || 180,
              transcriptionWidth: parseInt(ca.getPropertyValue('--sidebar-transcription-w')) || 300,
            }; break
          case 'grid':
            all.grid = {
              videoHeight: parseInt(sa.getPropertyValue('--grid-video-h')) || 240,
              transcriptionWidth: parseInt(ca.getPropertyValue('--grid-transcription-w')) || 320,
            }; break
          case 'spotlight':
            all.spotlight = {
              spotlightWidth: ws.getPropertyValue('--spotlight-area-w') || '60%',
              stripHeight: parseInt(sa.getPropertyValue('--spotlight-strip-h')) || 106,
              transcriptionHeight: parseInt(ca.getPropertyValue('--spotlight-transcription-h')) || 200,
            }; break
        }
        localStorage.setItem(PANEL_SIZES_KEY, JSON.stringify(all))
      }

      function applyPanelSizes() {
        const all = loadPanelSizes()
        const sizes = all[currentLayout]
        if (!sizes) return
        switch (currentLayout) {
          case 'filmstrip':
            if (sizes.videoHeight) spotlightArea.style.setProperty('--filmstrip-video-h', sizes.videoHeight + 'px')
            if (sizes.transcriptionWidth) contentArea.style.setProperty('--filmstrip-transcription-w', sizes.transcriptionWidth + 'px')
            break
          case 'sidebar':
            if (sizes.videoWidth) spotlightArea.style.setProperty('--sidebar-video-w', sizes.videoWidth + 'px')
            if (sizes.transcriptionWidth) contentArea.style.setProperty('--sidebar-transcription-w', sizes.transcriptionWidth + 'px')
            break
          case 'grid':
            if (sizes.videoHeight) spotlightArea.style.setProperty('--grid-video-h', sizes.videoHeight + 'px')
            if (sizes.transcriptionWidth) contentArea.style.setProperty('--grid-transcription-w', sizes.transcriptionWidth + 'px')
            break
          case 'spotlight':
            if (sizes.spotlightWidth) workspaceArea.style.setProperty('--spotlight-area-w', sizes.spotlightWidth)
            if (sizes.stripHeight) spotlightArea.style.setProperty('--spotlight-strip-h', sizes.stripHeight + 'px')
            if (sizes.transcriptionHeight) contentArea.style.setProperty('--spotlight-transcription-h', sizes.transcriptionHeight + 'px')
            break
        }
      }

      function initResizeHandle(handleEl, direction, getSize, setSize) {
        let startPos, startSize
        handleEl.addEventListener('mousedown', e => {
          e.preventDefault()
          startPos = direction === 'h' ? e.clientY : e.clientX
          startSize = getSize()
          handleEl.classList.add('active')
          document.body.style.cursor = direction === 'h' ? 'row-resize' : 'col-resize'
          document.body.style.userSelect = 'none'

          const onMove = ev => {
            const delta = (direction === 'h' ? ev.clientY : ev.clientX) - startPos
            const newSize = Math.max(60, startSize + delta)
            setSize(newSize)
          }

          const onUp = () => {
            handleEl.classList.remove('active')
            document.body.style.cursor = ''
            document.body.style.userSelect = ''
            document.removeEventListener('mousemove', onMove)
            document.removeEventListener('mouseup', onUp)
            savePanelSizes()
          }

          document.addEventListener('mousemove', onMove)
          document.addEventListener('mouseup', onUp)
        })
      }

      function clearResizeHandles() {
        document.querySelectorAll('.resize-h, .resize-v').forEach(el => el.remove())
      }

      function setupResizeHandles() {
        clearResizeHandles()
        const videoArea = document.querySelector('.video-area')
        const transcriptionPanel = document.querySelector('.transcription-panel')
        const presentationTile = document.querySelector('.presentation-tile')

        switch (currentLayout) {
          case 'filmstrip': {
            const hHandle = document.createElement('div')
            hHandle.className = 'resize-h'
            workspaceArea.insertBefore(hHandle, contentArea)
            initResizeHandle(hHandle, 'h',
              () => spotlightArea.offsetHeight,
              v => spotlightArea.style.setProperty('--filmstrip-video-h', v + 'px'))

            const vHandle = document.createElement('div')
            vHandle.className = 'resize-v'
            contentArea.insertBefore(vHandle, transcriptionPanel)
            initResizeHandle(vHandle, 'v',
              () => presentationTile.offsetWidth,
              v => contentArea.style.setProperty('--filmstrip-transcription-w', (contentArea.offsetWidth - v) + 'px'))
            break
          }
          case 'sidebar': {
            const vHandle1 = document.createElement('div')
            vHandle1.className = 'resize-v'
            contentArea.insertBefore(vHandle1, transcriptionPanel)
            initResizeHandle(vHandle1, 'v',
              () => presentationTile.offsetWidth,
              v => contentArea.style.setProperty('--sidebar-transcription-w', (contentArea.offsetWidth - v) + 'px'))

            const vHandle2 = document.createElement('div')
            vHandle2.className = 'resize-v'
            vHandle2.style.order = '2'
            workspaceArea.insertBefore(vHandle2, spotlightArea)
            initResizeHandle(vHandle2, 'v',
              () => contentArea.offsetWidth,
              v => spotlightArea.style.setProperty('--sidebar-video-w', (workspaceArea.offsetWidth - v) + 'px'))
            break
          }
          case 'grid': {
            const hHandle = document.createElement('div')
            hHandle.className = 'resize-h'
            workspaceArea.insertBefore(hHandle, contentArea)
            initResizeHandle(hHandle, 'h',
              () => spotlightArea.offsetHeight,
              v => spotlightArea.style.setProperty('--grid-video-h', v + 'px'))

            const vHandle = document.createElement('div')
            vHandle.className = 'resize-v'
            contentArea.insertBefore(vHandle, transcriptionPanel)
            initResizeHandle(vHandle, 'v',
              () => presentationTile.offsetWidth,
              v => contentArea.style.setProperty('--grid-transcription-w', (contentArea.offsetWidth - v) + 'px'))
            break
          }
          case 'spotlight': {
            const vHandle1 = document.createElement('div')
            vHandle1.className = 'resize-v'
            workspaceArea.insertBefore(vHandle1, contentArea)
            initResizeHandle(vHandle1, 'v',
              () => spotlightArea.offsetWidth,
              v => workspaceArea.style.setProperty('--spotlight-area-w', v + 'px'))

            const hHandle = document.createElement('div')
            hHandle.className = 'resize-h'
            spotlightArea.insertBefore(hHandle, videoArea)
            initResizeHandle(hHandle, 'h',
              () => spotlightTile.offsetHeight,
              v => spotlightArea.style.setProperty('--spotlight-strip-h', (spotlightArea.offsetHeight - v) + 'px'))

            if (transcriptionPanel) {
              const hHandle2 = document.createElement('div')
              hHandle2.className = 'resize-h'
              contentArea.insertBefore(hHandle2, transcriptionPanel)
              initResizeHandle(hHandle2, 'h',
                () => presentationTile.offsetHeight,
                v => contentArea.style.setProperty('--spotlight-transcription-h', (contentArea.offsetHeight - v) + 'px'))
            }
            break
          }
        }
      }

      applyPanelSizes()
      setupResizeHandles()
    </script>
  </body>
</html>
