<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Realtime Kanban Meeting Assistant</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #202124;
        color: #e8eaed;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
      }

      main {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        gap: 12px;
        min-height: 100vh;
        padding: 12px;
      }

      .topbar,
      .controls {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .topbar {
        border-radius: 8px;
        background: #3c4043;
        min-height: 36px;
        padding: 6px 12px;
      }

      .presenting-pill {
        display: inline-grid;
        place-items: center;
        width: 24px;
        height: 24px;
        border-radius: 999px;
        background: #5f6368;
        color: #ffffff;
        font-size: 12px;
        font-weight: 800;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: 13px;
        line-height: 1.2;
      }

      button {
        border: 0;
        border-radius: 999px;
        background: #3c4043;
        color: inherit;
        cursor: pointer;
        font: inherit;
        font-weight: 600;
        min-width: 96px;
        padding: 10px 16px;
      }

      button.primary {
        background: #1a73e8;
        color: #ffffff;
      }

      #leave {
        background: #ea4335;
        color: #ffffff;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.45;
      }

      .status,
      .empty,
      .log {
        color: #bdc1c6;
        font-size: 13px;
        line-height: 1.45;
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(0, 1fr) clamp(320px, 28vw, 420px);
        gap: 12px;
        min-height: 0;
      }

      .presentation-tile,
      .video-rail {
        min-width: 0;
        min-height: 0;
      }

      .presentation-tile {
        display: grid;
        padding: 14px;
      }

      .video-rail {
        overflow: auto;
        z-index: 1;
      }

      video {
        display: block;
        width: 100%;
        aspect-ratio: 16 / 9;
        border-radius: 8px;
        background: #202124;
        object-fit: cover;
      }

      .video-stack {
        display: grid;
        grid-template-columns: 1fr;
        align-content: start;
        gap: 12px;
      }

      .video-tile {
        position: relative;
        overflow: hidden;
        border-radius: 10px;
        background: #111418;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
      }

      .video-label {
        position: absolute;
        bottom: 8px;
        left: 8px;
        max-width: calc(100% - 16px);
        overflow: hidden;
        border-radius: 999px;
        background: rgba(32, 33, 36, 0.82);
        color: #ffffff;
        font-size: 12px;
        font-weight: 700;
        line-height: 1;
        padding: 5px 8px;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .board-surface {
        min-height: 0;
        max-width: 100%;
        overflow: auto;
        border-radius: 8px;
        background: #f5f6f8;
        color: #17191f;
        padding: 16px;
      }

      .board {
        display: grid;
        grid-template-columns: repeat(4, minmax(170px, 1fr));
        gap: 12px;
        align-items: start;
        min-width: 736px;
      }

      .column,
      .card {
        border: 1px solid #dde2eb;
        border-radius: 8px;
        background: #ffffff;
      }

      .column {
        display: grid;
        gap: 10px;
        min-width: 0;
        padding: 12px;
      }

      .column header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin: 0;
      }

      .column h2 {
        font-size: 14px;
        line-height: 1.3;
      }

      .count {
        display: inline-grid;
        place-items: center;
        min-width: 24px;
        min-height: 24px;
        padding: 0 7px;
        border-radius: 999px;
        background: #edf1f7;
        color: #5d6572;
        font-size: 12px;
        font-weight: 700;
      }

      .stack,
      .card {
        display: grid;
        gap: 10px;
      }

      .card {
        padding: 11px;
        background: #fbfcfe;
        cursor: pointer;
      }

      .card:focus-visible {
        outline: 3px solid rgba(26, 115, 232, 0.35);
        outline-offset: 2px;
      }

      .card-heading {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: start;
        gap: 8px;
      }

      .card-heading strong {
        min-width: 0;
        overflow-wrap: anywhere;
      }

      .card-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        color: #66707f;
        font-size: 12px;
        font-weight: 700;
        line-height: 1.2;
      }

      .card-meta span {
        border-radius: 999px;
        background: #edf1f7;
        padding: 4px 7px;
      }

      .owner-avatar {
        display: inline-grid;
        place-items: center;
        overflow: hidden;
        width: 28px;
        height: 28px;
        border: 2px solid #ffffff;
        border-radius: 999px;
        background: #f6f8fa;
        box-shadow: 0 0 0 1px rgba(27, 31, 36, 0.16);
      }

      .owner-avatar svg {
        display: block;
        width: 100%;
        height: 100%;
      }

      .owner-avatar.large {
        width: 42px;
        height: 42px;
        border-width: 3px;
      }

      .card.moved {
        animation: card-move-wiggle 1100ms ease-in-out;
        border-color: #1a73e8;
        box-shadow: 0 10px 24px rgba(26, 115, 232, 0.22);
        transform-origin: 50% 50%;
        will-change: transform;
      }

      .confetti-piece {
        position: fixed;
        z-index: 1000;
        width: 8px;
        height: 12px;
        border-radius: 2px;
        background: var(--confetti-color);
        pointer-events: none;
        animation: confetti-pop 1000ms ease-out forwards;
      }

      .toast-region {
        position: fixed;
        right: 18px;
        bottom: 18px;
        z-index: 1100;
        display: grid;
        gap: 10px;
        width: min(360px, calc(100vw - 36px));
        pointer-events: none;
      }

      .toast {
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 12px;
        background: #303134;
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.36);
        color: #ffffff;
        font-size: 14px;
        font-weight: 700;
        line-height: 1.35;
        padding: 12px 14px;
        animation: toast-in 180ms ease-out;
      }

      .comment-preview-region {
        position: fixed;
        inset: 0;
        z-index: 1050;
        display: grid;
        place-items: center;
        padding: 24px;
        pointer-events: none;
      }

      .comment-preview {
        display: grid;
        gap: 12px;
        width: min(560px, calc(100vw - 48px));
        border: 1px solid #dde2eb;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 28px 80px rgba(0, 0, 0, 0.42);
        color: #17191f;
        padding: 18px;
        transform-origin: 50% 60%;
        animation: comment-preview-open 260ms cubic-bezier(0.2, 0.9, 0.2, 1.15);
      }

      .comment-preview.closing {
        animation: comment-preview-close 220ms ease-in forwards;
      }

      .comment-preview-meta {
        justify-self: start;
        border-radius: 999px;
        background: #e8f0fe;
        color: #174ea6;
        font-size: 12px;
        font-weight: 800;
        line-height: 1;
        padding: 6px 9px;
      }

      .comment-preview-title {
        font-size: 18px;
        line-height: 1.25;
      }

      .comment-preview-body {
        color: #3c4043;
        font-size: 15px;
        line-height: 1.5;
        white-space: pre-wrap;
      }

      .comment-preview-details {
        display: grid;
        gap: 8px;
      }

      .comment-preview-detail {
        display: grid;
        gap: 3px;
      }

      .comment-preview-detail-label {
        color: #6f7785;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.04em;
        line-height: 1;
        text-transform: uppercase;
      }

      .comment-preview-detail-value {
        color: #3c4043;
        font-size: 13px;
        line-height: 1.4;
        white-space: pre-wrap;
      }

      .comment-preview-latest {
        display: grid;
        gap: 6px;
        border-radius: 8px;
        background: #f1f7ff;
        padding: 10px;
      }

      .card-detail-region {
        position: fixed;
        inset: 0;
        z-index: 1200;
        display: none;
        place-items: center;
        padding: 24px;
        background: rgba(32, 33, 36, 0.54);
      }

      .card-detail-region.visible {
        display: grid;
      }

      .card-detail {
        display: grid;
        gap: 14px;
        width: min(620px, calc(100vw - 48px));
        max-height: calc(100vh - 48px);
        overflow: auto;
        border: 1px solid #dde2eb;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 28px 80px rgba(0, 0, 0, 0.42);
        color: #17191f;
        padding: 18px;
      }

      .card-detail-header {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr) auto;
        align-items: start;
        gap: 12px;
      }

      .card-detail-title {
        display: grid;
        gap: 5px;
        min-width: 0;
      }

      .card-detail-title strong {
        font-size: 20px;
        line-height: 1.25;
      }

      .card-detail-owner {
        color: #5d6572;
        font-size: 13px;
        font-weight: 700;
      }

      .card-detail-close {
        min-width: 0;
        border-radius: 6px;
        background: transparent;
        color: #66707f;
        font-size: 24px;
        line-height: 1;
        padding: 2px 6px;
      }

      .card strong {
        font-size: 14px;
        line-height: 1.3;
      }

      .card p {
        margin: 0;
        color: #66707f;
        font-size: 13px;
        line-height: 1.45;
      }

      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .tags li {
        padding: 4px 8px;
        border-radius: 999px;
        background: var(--tag-bg);
        color: var(--tag-color);
        font-size: 12px;
        font-weight: 700;
        line-height: 1;
      }

      .log {
        min-height: 20px;
        padding: 0 2px;
      }

      .meeting-bar {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
        align-items: center;
        gap: 12px;
        min-height: 52px;
      }

      .controls {
        justify-content: center;
      }

      @keyframes card-move-wiggle {
        0% {
          transform: translate3d(0, 0, 0) rotate(0deg) scale(1);
        }

        12% {
          transform: translate3d(-10px, -12px, 0) rotate(-4deg) scale(1.05);
        }

        24% {
          transform: translate3d(9px, 4px, 0) rotate(4deg) scale(1.03);
        }

        36% {
          transform: translate3d(-7px, -7px, 0) rotate(-3deg) scale(1.04);
        }

        48% {
          transform: translate3d(6px, 2px, 0) rotate(3deg) scale(1.02);
        }

        62% {
          transform: translate3d(-4px, -4px, 0) rotate(-2deg) scale(1.025);
        }

        78% {
          transform: translate3d(3px, 1px, 0) rotate(1.2deg) scale(1.01);
        }

        100% {
          transform: translate3d(0, 0, 0) rotate(0deg) scale(1);
        }
      }

      @keyframes confetti-pop {
        0% {
          opacity: 1;
          transform: translate3d(-50%, -50%, 0) scale(1) rotate(0deg);
        }

        70% {
          opacity: 1;
        }

        100% {
          opacity: 0;
          transform: translate3d(calc(-50% + var(--dx)), calc(-50% + var(--dy)), 0) scale(0.75) rotate(var(--rotation));
        }
      }

      @keyframes toast-in {
        0% {
          opacity: 0;
          transform: translate3d(0, 8px, 0) scale(0.98);
        }

        100% {
          opacity: 1;
          transform: translate3d(0, 0, 0) scale(1);
        }
      }

      @keyframes comment-preview-open {
        0% {
          opacity: 0;
          transform: translate3d(0, 22px, 0) scale(0.9) rotate(-1.5deg);
        }

        72% {
          opacity: 1;
          transform: translate3d(0, -4px, 0) scale(1.025) rotate(0.5deg);
        }

        100% {
          opacity: 1;
          transform: translate3d(0, 0, 0) scale(1) rotate(0deg);
        }
      }

      @keyframes comment-preview-close {
        0% {
          opacity: 1;
          transform: translate3d(0, 0, 0) scale(1);
        }

        100% {
          opacity: 0;
          transform: translate3d(0, -18px, 0) scale(0.96) rotate(1deg);
        }
      }

      @media (max-width: 1100px) {
        .workspace {
          grid-template-columns: minmax(0, 1fr) 320px;
        }

        .board {
          grid-template-columns: repeat(4, minmax(160px, 1fr));
          min-width: 688px;
        }
      }

      @media (max-width: 860px) {
        main {
          padding: 12px;
        }

        .topbar {
          align-items: flex-start;
          flex-direction: column;
        }

        .workspace {
          grid-template-columns: 1fr;
        }

        .video-rail {
          order: -1;
          overflow: visible;
        }

        .video-stack {
          grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        }

        .meeting-bar {
          grid-template-columns: 1fr;
          justify-items: stretch;
        }

        .controls {
          order: -1;
        }
      }

      @media (max-width: 640px) {
        .board {
          grid-template-columns: 1fr;
          min-width: 0;
        }
      }
    </style>
  </head>
  <body>
    <script>window.__WS_URL__="{{.WS}}";</script>
    <main>
      <header class="topbar">
        <span class="presenting-pill" aria-hidden="true">K</span>
        <div>
          <h1>Realtime Kanban Meeting Assistant</h1>
          <p class="status" id="status">Not connected</p>
        </div>
      </header>

      <div class="workspace">
        <section class="presentation-tile video-tile" aria-label="Presented Kanban board">
          <div class="board-surface">
            <section id="board" class="board" aria-label="Kanban board"></section>
          </div>
          <span class="video-label">Kanban board</span>
        </section>

        <aside class="video-rail" aria-label="Conference videos">
          <div id="videoStack" class="video-stack">
            <div class="video-tile">
              <video id="localVideo" autoplay muted playsinline></video>
              <span class="video-label">You</span>
            </div>
          </div>
        </aside>
      </div>

      <footer class="meeting-bar">
        <p id="log" class="log" aria-live="polite">Team meeting</p>
        <div class="controls">
          <button id="join" class="primary" type="button">Join room</button>
          <button id="undoLast" type="button" disabled>Undo</button>
          <button id="auditLog" type="button" disabled>Audit</button>
          <button id="leave" type="button" disabled>Leave</button>
        </div>
        <span aria-hidden="true"></span>
      </footer>
    </main>
    <div id="toastRegion" class="toast-region" aria-live="polite" aria-atomic="true"></div>
    <div id="commentPreviewRegion" class="comment-preview-region" aria-live="polite" aria-atomic="true"></div>
    <div id="cardDetailRegion" class="card-detail-region"></div>

    <script>
      const statuses = ['Backlog', 'In Progress', 'Blocked', 'Done']
      const boardEl = document.getElementById('board')
      const statusEl = document.getElementById('status')
      const logEl = document.getElementById('log')
      const joinButton = document.getElementById('join')
      const undoLastButton = document.getElementById('undoLast')
      const auditLogButton = document.getElementById('auditLog')
      const leaveButton = document.getElementById('leave')
      const localVideo = document.getElementById('localVideo')
      const videoStack = document.getElementById('videoStack')
      const toastRegion = document.getElementById('toastRegion')
      const commentPreviewRegion = document.getElementById('commentPreviewRegion')
      const cardDetailRegion = document.getElementById('cardDetailRegion')

      let cards = []
      let pc
      let ws
      let localStream
      let authSession
      let hasBoardSnapshot = false
      let commentPreviewTimer
      const remoteElements = new Map()
      const cardSnapshots = new Map()

      joinButton.addEventListener('click', joinRoom)
      undoLastButton.addEventListener('click', () => sendKanbanCommand('undo_last_mutation'))
      auditLogButton.addEventListener('click', () => sendKanbanCommand('get_audit_events', { limit: 20 }))
      leaveButton.addEventListener('click', leaveRoom)
      window.addEventListener('beforeunload', leaveRoom)
      window.addEventListener('keydown', event => {
        if (event.key === 'Escape') {
          closeCardDetail()
        }
      })
      cardDetailRegion.addEventListener('click', event => {
        if (event.target === cardDetailRegion) {
          closeCardDetail()
        }
      })

      renderBoard()

      async function joinRoom() {
        joinButton.disabled = true
        setStatus('Authenticating')

        try {
          const preferredIdentity = promptWithFallback('Enter your name:', 'User')
          authSession = await ensureAuthenticated(preferredIdentity)
          setStatus('Checking voice agent')
          await ensureVoiceReady()
          setStatus('Requesting camera and microphone')
          localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true })
          localVideo.srcObject = localStream

          pc = new RTCPeerConnection()
          pc.ontrack = addRemoteTrack
          pc.onicecandidate = event => {
            if (!event.candidate || ws?.readyState !== WebSocket.OPEN) {
              return
            }
            ws.send(JSON.stringify({ event: 'candidate', data: JSON.stringify(event.candidate) }))
          }
          pc.onconnectionstatechange = () => {
            setStatus(`Conference connection: ${pc.connectionState}`)
            if (['failed', 'closed', 'disconnected'].includes(pc.connectionState)) {
              leaveRoom()
            }
          }

          localStream.getTracks().forEach(track => pc.addTrack(track, localStream))

          const scheme = window.location.protocol === 'https:' ? 'wss' : 'ws'
          const wsURL = new URL(window.__WS_URL__ || `${scheme}://${window.location.host}/websocket`)
          wsURL.searchParams.set('room_id', authSession.room_id)
          wsURL.searchParams.set('board_id', authSession.board_id)
          ws = new WebSocket(wsURL.toString())
          ws.onopen = () => {
            leaveButton.disabled = false
            undoLastButton.disabled = false
            auditLogButton.disabled = false
            setStatus('Connected')
          }
          ws.onmessage = event => {
            try { handleSignal(JSON.parse(event.data)) } catch (err) { console.warn('Invalid WS message', err) }
          }
          ws.onclose = () => leaveRoom()
          ws.onerror = () => setLog('WebSocket error')
        } catch (error) {
          setLog(error.message || String(error))
          leaveRoom()
        }
      }

      async function ensureAuthenticated(preferredIdentity) {
        const sessionURL = new URL('/auth/session', window.location.origin)
        sessionURL.searchParams.set('identity', cleanIdentity(preferredIdentity))
        const current = await fetch(sessionURL.toString(), {
          credentials: 'same-origin',
          headers: { 'X-Auto-Bot-Local-Session': '1' },
        })
        if (current.ok) return current.json()

        const token = await getLocalClipboardToken() || promptWithFallback('Enter app access token:', '')
        if (!token) throw new Error('Access token is required. Run scripts/local-up.sh, then paste the copied local token.')
        const response = await fetch('/auth/session', {
          method: 'POST',
          credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, identity: cleanIdentity(preferredIdentity) }),
        })
        if (!response.ok) throw new Error(`Authentication failed: ${response.status}`)
        return response.json()
      }

      async function ensureVoiceReady() {
        let lastStatus = null
        for (let attempt = 0; attempt < 8; attempt++) {
          const response = await fetch('/voice/status', { credentials: 'same-origin' })
          if (!response.ok) throw new Error(`Voice readiness check failed: ${response.status}`)
          lastStatus = await response.json()
          if (lastStatus.ready) return lastStatus

          const reason = `${lastStatus.last_error || ''} ${lastStatus.message || ''}`.toLowerCase()
          const retryable = reason === ' ' || reason.includes('still connecting') || reason.includes('not been initialized')
          if (!retryable) break
          await sleep(1000)
        }

        const message = lastStatus?.message || lastStatus?.last_error || 'Voice agent is not ready.'
        throw new Error(message)
      }

      function sleep(ms) {
        return new Promise(resolve => window.setTimeout(resolve, ms))
      }

      function promptWithFallback(message, fallback) {
        try {
          return window.prompt(message, fallback) || fallback
        } catch (_) {
          return fallback
        }
      }

      async function getLocalClipboardToken() {
        const host = window.location.hostname
        const isLocal = host === 'localhost' || host === '127.0.0.1' || host === '::1' || host === '[::1]'
        if (!isLocal || !navigator.clipboard?.readText) return ''
        try {
          const token = (await navigator.clipboard.readText()).trim()
          if (/^[A-Za-z0-9._~+=/-]{20,512}$/.test(token)) return token
        } catch (_) {
          // Clipboard access may be denied by the browser. Fall back to prompt.
        }
        return ''
      }

      function cleanIdentity(value) {
        const cleaned = String(value || 'User').trim().replace(/[^a-zA-Z0-9_-]/g, '_').slice(0, 64)
        return cleaned || 'User'
      }

      async function handleSignal(message) {
        switch (message.event) {
          case 'offer': {
            const offer = JSON.parse(message.data)
            await pc.setRemoteDescription(offer)
            const answer = await pc.createAnswer()
            await pc.setLocalDescription(answer)
            ws.send(JSON.stringify({ event: 'answer', data: JSON.stringify(answer) }))
            break
          }
          case 'candidate': {
            const candidate = JSON.parse(message.data)
            await pc.addIceCandidate(candidate)
            break
          }
          case 'kanban':
            handleKanbanMessage(JSON.parse(message.data))
            break
        }
      }

      function handleKanbanMessage(message) {
        switch (message.event) {
          case 'board':
            cards = Array.isArray(message.data?.cards) ? message.data.cards : []
            {
              const changes = cardChanges(cards)
              renderBoard(changes)
              changes.messages.forEach(showToast)
              changes.commentPreviews.forEach(showCommentPreview)
            }
            break
          case 'status':
            setLog(String(message.data || ''))
            break
          case 'confirmation':
            handleConfirmation(message.data)
            break
          case 'confirmation_cancelled':
            showToast('Action cancelled')
            break
          case 'conflict':
            handleConflict(message.data)
            break
          case 'conflict_resolved':
            showToast('Jira conflict resolved')
            break
          case 'audit_events':
            showAuditPanel(message.data?.events || [])
            break
          case 'replay_state':
            showReplayPanel(message.data)
            break
          case 'undo_result':
            showToast(message.data?.summary || 'Undo complete')
            break
          case 'command_result':
            if (message.data?.ok === false && message.data?.error) showToast(message.data.error)
            else if (message.data?.undo_summary) showToast(message.data.undo_summary)
            break
          case 'highlight':
            highlightCard(message.data?.card_id)
            break
          case 'close_detail':
            closeCardDetail()
            break
        }
      }

      function highlightCard(cardId) {
        if (!cardId) {
          return
        }
        const card = cards.find(candidate => candidate.id === cardId)
        if (card) {
          showCardDetail(card)
        }
      }

      function sendKanbanCommand(tool, args = {}) {
        if (!ws || ws.readyState !== WebSocket.OPEN) return
        ws.send(JSON.stringify({ event: 'kanban_command', data: JSON.stringify({ tool, arguments: args }) }))
      }

      function handleConfirmation(data) {
        if (!data?.confirmationId) return
        showToast(data.prompt || 'Action requires confirmation')
        const accepted = window.confirm(data.prompt || 'Confirm this Jira action?')
        sendKanbanCommand(accepted ? 'confirm_action' : 'cancel_confirmation', { confirmation_id: data.confirmationId })
      }

      function handleConflict(conflict) {
        if (!conflict?.conflictId) return
        const useJira = window.confirm(`${conflict.summary || 'Jira changed this card.'}\n\nOK: use Jira latest\nCancel: keep local meeting update`)
        sendKanbanCommand('resolve_jira_conflict', {
          conflict_id: conflict.conflictId,
          resolution: useJira ? 'use_jira' : 'keep_local'
        })
      }

      function showAuditPanel(events) {
        const panel = document.createElement('article')
        panel.className = 'card-detail'
        panel.setAttribute('role', 'dialog')
        panel.setAttribute('aria-modal', 'true')
        const header = document.createElement('header')
        header.className = 'card-detail-header'
        const title = document.createElement('div')
        title.className = 'card-detail-title'
        const strong = document.createElement('strong')
        strong.textContent = 'Recent board audit'
        title.appendChild(strong)
        const closeButton = document.createElement('button')
        closeButton.className = 'card-detail-close'
        closeButton.type = 'button'
        closeButton.textContent = 'x'
        closeButton.addEventListener('click', closeCardDetail)
        header.append(title, closeButton)
        const details = document.createElement('div')
        details.className = 'comment-preview-details'
        if (events.length === 0) details.appendChild(renderPreviewDetail('Events', 'No mutation events yet.'))
        events.slice(0, 12).forEach(event => {
          const row = document.createElement('div')
          row.className = 'comment-preview-detail-value'
          const text = document.createElement('span')
          text.textContent = `${event.summary || event.toolName} (${event.eventId})`
          const replay = document.createElement('button')
          replay.type = 'button'
          replay.textContent = 'Replay'
          replay.addEventListener('click', () => sendKanbanCommand('replay_audit_event', { event_id: event.eventId }))
          const undo = document.createElement('button')
          undo.type = 'button'
          undo.textContent = 'Undo'
          undo.addEventListener('click', () => sendKanbanCommand('undo_last_mutation', { event_id: event.eventId }))
          row.append(text, replay, undo)
          details.appendChild(renderPreviewDetail(event.occurredAt || 'Event', row))
        })
        panel.append(header, details)
        cardDetailRegion.replaceChildren(panel)
        cardDetailRegion.classList.add('visible')
      }

      function showReplayPanel(data) {
        if (!data?.ok) {
          showToast(data?.error || 'Audit event not found')
          return
        }
        const event = data.event || {}
        const transcript = data.transcript?.summary || 'No transcript evidence captured.'
        showToast(`${event.summary || 'Audit replay'}: ${transcript}`)
      }

      function addRemoteTrack(event) {
        const stream = event.streams[0]
        if (!stream) {
          return
        }

        if (event.track.kind === 'audio') {
          // Attach a hidden audio sink so the assistant's voice and other
          // participants are audible. Re-using the same key as the video
          // tile is fine — getElementById is unique and we just need one
          // element per stream.
          const key = `audio:${stream.id}`
          if (remoteElements.has(key)) {
            return
          }
          const audio = document.createElement('audio')
          audio.autoplay = true
          audio.srcObject = stream
          audio.style.display = 'none'
          document.body.appendChild(audio)
          remoteElements.set(key, audio)
          stream.onremovetrack = () => {
            audio.remove()
            remoteElements.delete(key)
          }
          return
        }

        if (remoteElements.has(stream.id)) {
          return
        }

        const tile = document.createElement('div')
        tile.className = 'video-tile'

        const video = document.createElement('video')
        video.autoplay = true
        video.playsInline = true
        video.srcObject = stream

        const label = document.createElement('span')
        label.className = 'video-label'
        label.textContent = 'Participant'

        tile.append(video, label)
        videoStack.appendChild(tile)
        remoteElements.set(stream.id, tile)

        stream.onremovetrack = () => {
          tile.remove()
          remoteElements.delete(stream.id)
        }
      }

      function renderBoard(changes = { moved: new Set(), completed: new Set(), messages: [], commentPreviews: [] }) {
        boardEl.replaceChildren(...statuses.map(status => {
          const columnCards = cards.filter(card => card.status === status)
          const column = document.createElement('section')
          column.className = 'column'
          column.setAttribute('aria-label', `${status} cards`)

          const header = document.createElement('header')
          const title = document.createElement('h2')
          title.textContent = status
          const count = document.createElement('span')
          count.className = 'count'
          count.textContent = String(columnCards.length)
          header.append(title, count)

          const stack = document.createElement('div')
          stack.className = 'stack'
          if (columnCards.length === 0) {
            const empty = document.createElement('div')
            empty.className = 'empty'
            empty.textContent = 'Empty'
            stack.appendChild(empty)
          } else {
            stack.append(...columnCards.map(card => renderCard(
              card,
              changes.moved.has(card.id),
              changes.completed.has(card.id)
            )))
          }

          column.append(header, stack)
          return column
        }))
      }

      function renderCard(card, moved = false, completed = false) {
        const article = document.createElement('article')
        article.className = 'card'
        article.tabIndex = 0
        article.setAttribute('role', 'button')
        article.setAttribute('aria-label', `Open card details for ${card.title || 'untitled card'}`)
        article.addEventListener('click', () => showCardDetail(card))
        article.addEventListener('keydown', event => {
          if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault()
            showCardDetail(card)
          }
        })
        if (moved) {
          window.requestAnimationFrame(() => {
            article.classList.add('moved')
            window.setTimeout(() => article.classList.remove('moved'), 1200)
          })
        }
        if (completed) {
          window.requestAnimationFrame(() => fireConfetti(article))
        }

        const heading = document.createElement('div')
        heading.className = 'card-heading'

        const title = document.createElement('strong')
        title.textContent = card.title
        heading.append(title, renderOwnerAvatar(card))
        article.appendChild(heading)

        const meta = renderCardMeta(card)
        if (meta) {
          article.appendChild(meta)
        }

        if (card.tags?.length > 0) {
          const tags = document.createElement('ul')
          tags.className = 'tags'
          tags.setAttribute('aria-label', `${card.title} tags`)
          tags.append(...card.tags.map(tag => {
            const item = document.createElement('li')
            const colors = tagColors(tag)
            item.style.setProperty('--tag-bg', colors.background)
            item.style.setProperty('--tag-color', colors.color)
            item.textContent = tag
            return item
          }))
          article.appendChild(tags)
        }

        return article
      }

      function renderOwnerAvatar(card, options = {}) {
        const owner = cardOwner(card)
        const avatar = document.createElement('span')
        avatar.className = `owner-avatar${options.large ? ' large' : ''}`
        avatar.title = `Owner: ${owner.name}`
        avatar.setAttribute('aria-label', `Owner: ${owner.name}`)
        avatar.appendChild(renderIdenticon(owner.name))
        return avatar
      }

      function cardOwner(card) {
        if (card?.assignee?.displayName || card?.assignee?.emailAddress || card?.assignee?.accountId) {
          return {
            name: card.assignee.displayName || card.assignee.emailAddress || card.assignee.accountId
          }
        }
        const owners = [
          'Avery Chen',
          'Blake Stone',
          'Casey Morgan',
          'Dana Patel',
          'Emery Brooks',
          'Finley Rao',
          'Harper Kim',
          'Jordan Lee'
        ]
        const seed = String(card?.id || card?.title || 'kanban-card')
        const hash = hashString(seed)
        return {
          name: owners[hash % owners.length]
        }
      }

      function renderCardMeta(card) {
        const values = []
        if (card.priority) values.push(`Priority ${card.priority}`)
        if (card.dueDate) values.push(`ETA ${card.dueDate}`)
        if (card.issueType === 'Sub-task' && card.parentId) values.push(`Sub-task of ${card.parentId}`)
        if (card.blockedReason) values.push('Blocked')
        if ((card.comments || []).length > 0) values.push(`${card.comments.length} comment${card.comments.length === 1 ? '' : 's'}`)
        if (values.length === 0) return null
        const meta = document.createElement('div')
        meta.className = 'card-meta'
        meta.append(...values.map(value => {
          const item = document.createElement('span')
          item.textContent = value
          return item
        }))
        return meta
      }

      function renderIdenticon(seed) {
        const svgNS = 'http://www.w3.org/2000/svg'
        const svg = document.createElementNS(svgNS, 'svg')
        svg.setAttribute('viewBox', '0 0 5 5')
        svg.setAttribute('aria-hidden', 'true')

        const background = document.createElementNS(svgNS, 'rect')
        background.setAttribute('width', '5')
        background.setAttribute('height', '5')
        background.setAttribute('fill', '#f6f8fa')
        svg.appendChild(background)

        const patternHash = hashString(`${seed}:pattern`)
        const color = `hsl(${hashString(`${seed}:color`) % 360} 54% 44%)`
        let filled = 0

        for (let y = 0; y < 5; y++) {
          for (let x = 0; x < 3; x++) {
            const bitIndex = y * 3 + x
            if (((patternHash >>> bitIndex) & 1) === 0) {
              continue
            }

            appendIdenticonCell(svg, x, y, color)
            filled++
            if (x !== 2) {
              appendIdenticonCell(svg, 4 - x, y, color)
            }
          }
        }

        if (filled === 0) {
          appendIdenticonCell(svg, 2, 2, color)
        }

        return svg
      }

      function appendIdenticonCell(svg, x, y, color) {
        const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect')
        rect.setAttribute('x', String(x))
        rect.setAttribute('y', String(y))
        rect.setAttribute('width', '1')
        rect.setAttribute('height', '1')
        rect.setAttribute('fill', color)
        svg.appendChild(rect)
      }

      function hashString(value) {
        let hash = 2166136261
        const text = String(value || '')
        for (let index = 0; index < text.length; index++) {
          hash ^= text.charCodeAt(index)
          hash = Math.imul(hash, 16777619)
        }
        return hash >>> 0
      }

      function showCardDetail(card) {
        if (!card) {
          return
        }

        const owner = cardOwner(card)
        const panel = document.createElement('article')
        panel.className = 'card-detail'
        panel.setAttribute('role', 'dialog')
        panel.setAttribute('aria-modal', 'true')
        panel.setAttribute('aria-label', `Card details for ${card.title || 'untitled card'}`)

        const header = document.createElement('header')
        header.className = 'card-detail-header'

        const titleGroup = document.createElement('div')
        titleGroup.className = 'card-detail-title'
        const title = document.createElement('strong')
        title.textContent = card.title || 'Untitled card'
        const ownerText = document.createElement('span')
        ownerText.className = 'card-detail-owner'
        ownerText.textContent = `Owner: ${owner.name}`
        titleGroup.append(title, ownerText)

        const closeButton = document.createElement('button')
        closeButton.className = 'card-detail-close'
        closeButton.type = 'button'
        closeButton.setAttribute('aria-label', 'Close card details')
        closeButton.textContent = 'x'
        closeButton.addEventListener('click', closeCardDetail)

        header.append(renderOwnerAvatar(card, { large: true }), titleGroup, closeButton)

        const details = document.createElement('div')
        details.className = 'comment-preview-details'
        details.appendChild(renderPreviewDetail('Status', card.status || 'Unassigned'))
        details.appendChild(renderPreviewDetail('Card ID', card.id || 'No card id'))
        details.appendChild(renderPreviewDetail('Issue type', card.issueType || 'Task'))
        details.appendChild(renderPreviewDetail('Parent', card.parentId || 'No parent'))
        details.appendChild(renderPreviewDetail('Owner', owner.name))
        details.appendChild(renderPreviewDetail('Priority', card.priority || 'No priority set'))
        details.appendChild(renderPreviewDetail('ETA', card.dueDate || 'No ETA set'))
        details.appendChild(renderPreviewDetail('Blocked reason', card.blockedReason || 'No blocker recorded'))
        details.appendChild(renderPreviewDetail('Tags', card.tags?.length > 0 ? renderTagList(card) : 'No tags'))
        details.appendChild(renderPreviewDetail('Notes', card.notes || 'No notes yet.'))
        details.appendChild(renderPreviewDetail('Latest comment', latestCommentBody(card) || 'No comments yet.'))

        panel.append(header, details)
        cardDetailRegion.replaceChildren(panel)
        cardDetailRegion.classList.add('visible')
        closeButton.focus()
      }

      function closeCardDetail() {
        cardDetailRegion.classList.remove('visible')
        cardDetailRegion.replaceChildren()
      }

      function renderTagList(card) {
        const tags = document.createElement('ul')
        tags.className = 'tags'
        tags.setAttribute('aria-label', `${card.title || 'Card'} tags`)
        tags.append(...(card.tags || []).map(tag => {
          const item = document.createElement('li')
          const colors = tagColors(tag)
          item.style.setProperty('--tag-bg', colors.background)
          item.style.setProperty('--tag-color', colors.color)
          item.textContent = tag
          return item
        }))
        return tags
      }

      function cardChanges(nextCards) {
        const moved = new Set()
        const completed = new Set()
        const messages = []
        const commentPreviews = []
        const nextIds = new Set()
        const shouldToast = hasBoardSnapshot

        for (const card of nextCards) {
          nextIds.add(card.id)
          const previousCard = cardSnapshots.get(card.id)
          if (!previousCard) {
            if (shouldToast) {
              messages.push(`Created "${card.title}" in ${card.status}`)
            }
            cardSnapshots.set(card.id, cardSnapshot(card))
            continue
          }

          if (previousCard.status !== card.status) {
            moved.add(card.id)
            if (card.status === 'Done') {
              completed.add(card.id)
            }
            if (shouldToast) {
              messages.push(`Moved "${card.title}" to ${card.status}`)
            }
          }

          if (previousCard.title !== card.title) {
            if (shouldToast) {
              messages.push(`Renamed "${previousCard.title}" to "${card.title}"`)
            }
          }

          if (!sameTags(previousCard.tags, card.tags || [])) {
            if (shouldToast) {
              messages.push(`Updated tags on "${card.title}"`)
            }
          }

          if (previousCard.notes !== (card.notes || '')) {
            if (shouldToast) {
              const comment = addedComment(previousCard.notes, card.notes || '')
              messages.push(comment ? `Added comment to "${card.title}"` : `Updated "${card.title}"`)
              if (comment) {
                commentPreviews.push({ card: cardSnapshot(card), comment })
              }
            }
          }

          if (previousCard.assigneeKey !== assigneeKey(card) && shouldToast) {
            messages.push(card.assignee ? `Assigned "${card.title}" to ${cardOwner(card).name}` : `Unassigned "${card.title}"`)
          }

          if (previousCard.dueDate !== (card.dueDate || '') && shouldToast) {
            messages.push(card.dueDate ? `Set ETA on "${card.title}" to ${card.dueDate}` : `Cleared ETA on "${card.title}"`)
          }

          if (previousCard.priority !== (card.priority || '') && shouldToast) {
            messages.push(card.priority ? `Set "${card.title}" priority to ${card.priority}` : `Cleared priority on "${card.title}"`)
          }

          const latestComment = latestCommentBody(card)
          if (previousCard.latestComment !== latestComment && latestComment && shouldToast) {
            messages.push(`Added comment to "${card.title}"`)
            commentPreviews.push({ card: cardSnapshot(card), comment: latestComment })
          }

          cardSnapshots.set(card.id, cardSnapshot(card))
        }

        for (const [cardId, previousCard] of cardSnapshots.entries()) {
          if (!nextIds.has(cardId)) {
            if (shouldToast) {
              messages.push(`Deleted "${previousCard.title}"`)
            }
            cardSnapshots.delete(cardId)
          }
        }
        hasBoardSnapshot = true

        return { moved, completed, messages, commentPreviews }
      }

      function cardSnapshot(card) {
        return {
          id: card.id || '',
          title: card.title || '',
          status: card.status || '',
          notes: card.notes || '',
          tags: Array.isArray(card.tags) ? [...card.tags] : [],
          assignee: card.assignee ? { ...card.assignee } : null,
          assigneeKey: assigneeKey(card),
          dueDate: card.dueDate || '',
          priority: card.priority || '',
          blockedReason: card.blockedReason || '',
          latestComment: latestCommentBody(card)
        }
      }

      function assigneeKey(card) {
        return card?.assignee?.accountId || card?.assignee?.displayName || card?.assignee?.emailAddress || ''
      }

      function latestCommentBody(card) {
        const comments = Array.isArray(card?.comments) ? card.comments : []
        return comments.length > 0 ? String(comments[comments.length - 1]?.body || '').trim() : ''
      }

      function sameTags(left, right) {
        if (left.length !== right.length) {
          return false
        }

        return left.every((tag, index) => tag === right[index])
      }

      function addedComment(previousNotes, nextNotes) {
        const previous = String(previousNotes || '').trim()
        const next = String(nextNotes || '').trim()
        if (!next || next === previous) {
          return ''
        }
        if (previous && next.startsWith(previous)) {
          return next.slice(previous.length).replace(/^[\s:;,.|-]+/, '').trim() || next
        }
        return next
      }

      function showToast(message) {
        if (!message) {
          return
        }

        const toast = document.createElement('div')
        toast.className = 'toast'
        toast.textContent = message
        toastRegion.appendChild(toast)

        while (toastRegion.children.length > 4) {
          toastRegion.firstElementChild.remove()
        }
        window.setTimeout(() => toast.remove(), 4200)
      }

      function showCommentPreview(preview) {
        if (!preview?.comment) {
          return
        }

        window.clearTimeout(commentPreviewTimer)

        const panel = document.createElement('article')
        panel.className = 'comment-preview'
        panel.setAttribute('aria-label', `Card details for ${preview.card.title}`)

        const meta = document.createElement('span')
        meta.className = 'comment-preview-meta'
        meta.textContent = `${preview.card.status || 'Card'} card`

        const title = document.createElement('strong')
        title.className = 'comment-preview-title'
        title.textContent = preview.card.title || 'Untitled card'

        const details = document.createElement('div')
        details.className = 'comment-preview-details'

        details.appendChild(renderPreviewDetail('Status', preview.card.status || 'Unassigned'))
        details.appendChild(renderPreviewDetail('Card ID', preview.card.id || 'No card id'))
        details.appendChild(renderPreviewDetail('Owner', cardOwner(preview.card).name))
        if (preview.card.tags?.length > 0) {
          details.appendChild(renderPreviewDetail('Tags', renderTagList(preview.card)))
        } else {
          details.appendChild(renderPreviewDetail('Tags', 'No tags'))
        }
        details.appendChild(renderPreviewDetail('Notes', preview.card.notes || 'No notes yet.'))

        const latest = document.createElement('div')
        latest.className = 'comment-preview-latest'
        latest.appendChild(renderPreviewDetail('Latest comment', preview.comment))

        const previewHeader = document.createElement('div')
        previewHeader.className = 'card-detail-header'
        const previewTitle = document.createElement('div')
        previewTitle.className = 'card-detail-title'
        const ownerText = document.createElement('span')
        ownerText.className = 'card-detail-owner'
        ownerText.textContent = `Owner: ${cardOwner(preview.card).name}`
        previewTitle.append(title, ownerText)
        previewHeader.append(renderOwnerAvatar(preview.card, { large: true }), previewTitle)

        panel.append(meta, previewHeader, details, latest)
        commentPreviewRegion.replaceChildren(panel)

        commentPreviewTimer = window.setTimeout(() => closeCommentPreview(panel), 4200)
      }

      function renderPreviewDetail(labelText, value) {
        const detail = document.createElement('div')
        detail.className = 'comment-preview-detail'

        const label = document.createElement('span')
        label.className = 'comment-preview-detail-label'
        label.textContent = labelText

        let valueEl
        if (value instanceof Node) {
          valueEl = value
        } else {
          valueEl = document.createElement('p')
          valueEl.className = 'comment-preview-detail-value'
          valueEl.textContent = String(value)
        }

        detail.append(label, valueEl)
        return detail
      }

      function closeCommentPreview(panel) {
        if (!panel || panel.parentElement !== commentPreviewRegion) {
          return
        }

        panel.classList.add('closing')
        panel.addEventListener('animationend', () => panel.remove(), { once: true })
      }

      function fireConfetti(anchor) {
        const rect = anchor.getBoundingClientRect()
        const originX = rect.left + rect.width / 2
        const originY = rect.top + Math.min(rect.height / 2, 48)
        const colors = ['#1a73e8', '#34a853', '#fbbc04', '#ea4335', '#a142f4', '#00acc1']

        for (let index = 0; index < 24; index++) {
          const piece = document.createElement('span')
          const angle = (Math.PI * 2 * index) / 24
          const distance = 46 + Math.random() * 58
          const drift = (Math.random() - 0.5) * 42

          piece.className = 'confetti-piece'
          piece.style.left = `${originX}px`
          piece.style.top = `${originY}px`
          piece.style.setProperty('--dx', `${Math.cos(angle) * distance + drift}px`)
          piece.style.setProperty('--dy', `${Math.sin(angle) * distance + 42 + Math.random() * 28}px`)
          piece.style.setProperty('--rotation', `${Math.random() * 720 - 360}deg`)
          piece.style.setProperty('--confetti-color', colors[index % colors.length])

          document.body.appendChild(piece)
          window.setTimeout(() => piece.remove(), 1050)
        }
      }

      function tagColors(tag) {
        let hash = 0
        for (const character of String(tag)) {
          hash = ((hash << 5) - hash + character.charCodeAt(0)) | 0
        }

        const hue = Math.abs(hash) % 360
        return {
          background: `hsl(${hue} 78% 90%)`,
          color: `hsl(${hue} 72% 26%)`
        }
      }

      function leaveRoom() {
        joinButton.disabled = false
        leaveButton.disabled = true
        undoLastButton.disabled = true
        auditLogButton.disabled = true

        if (ws && ws.readyState !== WebSocket.CLOSED) {
          ws.close()
        }
        ws = undefined

        if (pc) {
          pc.close()
        }
        pc = undefined

        if (localStream) {
          localStream.getTracks().forEach(track => track.stop())
        }
        localStream = undefined
        localVideo.srcObject = null

        remoteElements.forEach(tile => tile.remove())
        remoteElements.clear()
        setStatus('Not connected')
      }

      function setStatus(message) {
        statusEl.textContent = message
      }

      function setLog(message) {
        logEl.textContent = message
      }
    </script>
  </body>
</html>
