# Configures GitHub's automatic release-notes generation.
# PRs are grouped by label; see https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes
changelog:
  exclude:
    labels:
      - ignore-for-release
      - dependencies
  categories:
    - title: ⚠️ Breaking Changes
      labels:
        - breaking
    - title: ✨ Features
      labels:
        - feature
        - enhancement
    - title: 🐛 Bug Fixes
      labels:
        - bug
        - fix
    - title: 🔒 Security
      labels:
        - security
    - title: 📖 Documentation
      labels:
        - documentation
        - docs
    - title: 🚀 Deployment & Infrastructure
      labels:
        - deploy
        - helm
        - ci
    - title: Other Changes
      labels:
        - "*"
