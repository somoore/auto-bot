name: release

# Build and publish the auto-bot image to GHCR and Docker Hub on a version tag.
# Images are built from the exact committed code so the community runs what we ship.
#
# Required repository secrets for Docker Hub:
#   DOCKERHUB_USERNAME, DOCKERHUB_TOKEN
# GHCR uses the built-in GITHUB_TOKEN (no extra secret).

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write       # create the GitHub Release
  packages: write       # push to GHCR
  id-token: write       # keyless cosign signing (OIDC)
  attestations: write   # build provenance attestation

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # Gated by the 'release' environment: a tag push pauses here until a required
    # reviewer approves, so no image is built/published/signed without sign-off.
    environment: release
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # QEMU enables cross-arch (arm64) builds on the amd64 runner. The image is
      # a CGo/libopus build, so each arch compiles inside its own emulated stage.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Docker Hub is optional — only runs if DOCKERHUB_USERNAME secret is set.
      - name: Log in to Docker Hub
        if: ${{ vars.DOCKERHUB_ENABLED == 'true' }}
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
            ${{ vars.DOCKERHUB_ENABLED == 'true' && format('docker.io/{0}/auto-bot', secrets.DOCKERHUB_USERNAME) || '' }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
          # metadata-action treats a version with a pre-release identifier (e.g.
          # 0.0.1-prealpha) as NOT latest: it won't move the `latest` tag or emit
          # the {{major}}.{{minor}} tag for it. Stable tags (e.g. 1.2.0) still do.

      - name: Build and push
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64   # multi-arch (amd64 + Apple Silicon / Graviton)
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true     # SLSA build provenance attestation (buildkit, per-arch)
          sbom: true           # buildkit SBOM attestation (per-arch)

      - name: Install cosign
        uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0

      - name: Sign the image (keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          # Sign the immutable digest (not a mutable tag). Keyless: identity comes
          # from the GitHub Actions OIDC token, recorded in the public Rekor log.
          cosign sign --yes "ghcr.io/${{ github.repository }}@${DIGEST}"

      # Generate an SPDX SBOM of the published image and attach it as a
      # cosign-signed attestation (keyless). This is what docs/deployment.md tells
      # users to verify with `cosign verify-attestation --type spdxjson`. (The
      # build also carries buildkit SBOM/provenance attestations; this adds the
      # cosign-signed, Rekor-logged SBOM on top.)
      - name: Generate SBOM (SPDX JSON)
        uses: anchore/sbom-action@f325610c9f50a54015d37c8d16cb3b0e2c8f4de0 # v0.18.0
        with:
          image: ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attest the SBOM (keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign attest --yes \
            --predicate sbom.spdx.json \
            --type spdxjson \
            "ghcr.io/${{ github.repository }}@${DIGEST}"

      - name: Create GitHub Release with auto-generated changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          # Tags with a pre-release identifier (e.g. -prealpha, -alpha, -beta, -rc)
          # are published as GitHub pre-releases (not marked "Latest").
          PRERELEASE_FLAG=""
          case "$TAG" in
            *-*) PRERELEASE_FLAG="--prerelease" ;;
          esac
          # Auto-generates notes from merged PRs (categorized via .github/release.yml).
          # Attaches the SPDX SBOM as a downloadable release asset.
          gh release create "$TAG" \
            --title "$TAG" \
            $PRERELEASE_FLAG \
            --generate-notes \
            --notes "Container image: \`ghcr.io/${{ github.repository }}:${TAG#v}\` (\`${DIGEST}\`), multi-arch (amd64+arm64), signed with cosign. SBOM (SPDX) attached below and attested on the image. See [docs/deployment.md](https://github.com/${{ github.repository }}/blob/main/docs/deployment.md#verifying-the-published-image) to verify." \
            sbom.spdx.json
