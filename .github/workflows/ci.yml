name: ci

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality gate
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install pinned Go quality tools
        run: |
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          go install golang.org/x/tools/cmd/goimports@v0.45.0
          go install golang.org/x/vuln/cmd/govulncheck@v1.3.0
          go install github.com/securego/gosec/v2/cmd/gosec@v2.26.1

      - name: Run repository quality gate
        run: scripts/pre-commit

      - name: Build Docker image
        run: docker build --pull=false -t auto-bot:ci .

  pre-commit-framework:
    name: pre-commit framework
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install pinned local tools
        run: |
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          go install golang.org/x/tools/cmd/goimports@v0.45.0
          go install golang.org/x/vuln/cmd/govulncheck@v1.3.0
          go install github.com/securego/gosec/v2/cmd/gosec@v2.26.1
          python3 -m pip install --user pre-commit==4.6.0
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Validate pre-commit config
        run: pre-commit validate-config

      - name: Run pre-commit on all files
        run: pre-commit run --all-files --show-diff-on-failure
