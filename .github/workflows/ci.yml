name: ci

# Quality + supply-chain gates on every push and pull request.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  go:
    name: Go build, test, vuln scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install build dependencies (libopus for CGo voice codec)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libopus-dev pkg-config

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          check-latest: false

      - name: Verify modules
        run: go mod verify

      - name: No phantom/unused dependencies
        run: |
          # go.mod/go.sum must already be tidy — fails if a dep is unused or missing.
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

      - name: Dead-code & lint (staticcheck)
        run: |
          # Catches unused functions/types/fields and other issues the compiler allows.
          go install honnef.co/go/tools/cmd/staticcheck@latest
          "$(go env GOPATH)/bin/staticcheck" ./...

      - name: Vulnerability scan
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)/bin/govulncheck" ./...

  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0       # full history for a complete scan

      - name: gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # required to scan PR diffs
          GITLEAKS_VERSION: 8.30.1

  helm:
    name: Helm chart lint + template
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4

      - name: Lint chart
        run: |
          helm lint deploy/helm/auto-bot
          helm template auto-bot deploy/helm/auto-bot >/dev/null
          helm template auto-bot deploy/helm/auto-bot --set awsRolesAnywhere.enabled=true >/dev/null
