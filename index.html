<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Realtime Kanban Meeting Assistant</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #202124;
        color: #e8eaed;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
      }

      main {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        gap: 12px;
        min-height: 100vh;
        padding: 12px;
      }

      .topbar,
      .controls {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .topbar {
        border-radius: 8px;
        background: #3c4043;
        min-height: 36px;
        padding: 6px 12px;
      }

      .presenting-pill {
        display: inline-grid;
        place-items: center;
        width: 24px;
        height: 24px;
        border-radius: 999px;
        background: #5f6368;
        color: #ffffff;
        font-size: 12px;
        font-weight: 800;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: 13px;
        line-height: 1.2;
      }

      button {
        border: 0;
        border-radius: 999px;
        background: #3c4043;
        color: inherit;
        cursor: pointer;
        font: inherit;
        font-weight: 600;
        min-width: 96px;
        padding: 10px 16px;
      }

      button.primary {
        background: #1a73e8;
        color: #ffffff;
      }

      #leave {
        background: #ea4335;
        color: #ffffff;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.45;
      }

      .status,
      .empty,
      .log {
        color: #bdc1c6;
        font-size: 13px;
        line-height: 1.45;
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(0, 1fr) clamp(320px, 28vw, 420px);
        gap: 12px;
        min-height: 0;
      }

      .presentation-tile,
      .video-rail {
        min-width: 0;
        min-height: 0;
      }

      .presentation-tile {
        display: grid;
        padding: 14px;
      }

      .video-rail {
        overflow: auto;
        z-index: 1;
      }

      video {
        display: block;
        width: 100%;
        aspect-ratio: 16 / 9;
        border-radius: 8px;
        background: #202124;
        object-fit: cover;
      }

      .video-stack {
        display: grid;
        grid-template-columns: 1fr;
        align-content: start;
        gap: 12px;
      }

      .video-tile {
        position: relative;
        overflow: hidden;
        border-radius: 10px;
        background: #111418;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
      }

      .video-label {
        position: absolute;
        bottom: 8px;
        left: 8px;
        max-width: calc(100% - 16px);
        overflow: hidden;
        border-radius: 999px;
        background: rgba(32, 33, 36, 0.82);
        color: #ffffff;
        font-size: 12px;
        font-weight: 700;
        line-height: 1;
        padding: 5px 8px;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .board-surface {
        min-height: 0;
        max-width: 100%;
        overflow: auto;
        border-radius: 8px;
        background: #f5f6f8;
        color: #17191f;
        padding: 16px;
      }

      .board {
        display: grid;
        grid-template-columns: repeat(5, minmax(170px, 1fr));
        gap: 12px;
        align-items: start;
        min-width: 920px;
      }

      .column,
      .card {
        border: 1px solid #dde2eb;
        border-radius: 8px;
        background: #ffffff;
      }

      .column {
        display: grid;
        gap: 10px;
        min-width: 0;
        padding: 12px;
      }

      .column header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin: 0;
      }

      .column h2 {
        font-size: 14px;
        line-height: 1.3;
      }

      .count {
        display: inline-grid;
        place-items: center;
        min-width: 24px;
        min-height: 24px;
        padding: 0 7px;
        border-radius: 999px;
        background: #edf1f7;
        color: #5d6572;
        font-size: 12px;
        font-weight: 700;
      }

      .stack,
      .card {
        display: grid;
        gap: 10px;
      }

      .card {
        padding: 11px;
        background: #fbfcfe;
      }

      .card strong {
        font-size: 14px;
        line-height: 1.3;
      }

      .card p {
        margin: 0;
        color: #66707f;
        font-size: 13px;
        line-height: 1.45;
      }

      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .tags li {
        padding: 4px 8px;
        border-radius: 999px;
        background: var(--tag-bg);
        color: var(--tag-color);
        font-size: 12px;
        font-weight: 700;
        line-height: 1;
      }

      .log {
        min-height: 20px;
        padding: 0 2px;
      }

      .meeting-bar {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
        align-items: center;
        gap: 12px;
        min-height: 52px;
      }

      .controls {
        justify-content: center;
      }

      @media (max-width: 1100px) {
        .workspace {
          grid-template-columns: minmax(0, 1fr) 320px;
        }

        .board {
          grid-template-columns: repeat(5, minmax(160px, 1fr));
          min-width: 860px;
        }
      }

      @media (max-width: 860px) {
        main {
          padding: 12px;
        }

        .topbar {
          align-items: flex-start;
          flex-direction: column;
        }

        .workspace {
          grid-template-columns: 1fr;
        }

        .video-rail {
          order: -1;
          overflow: visible;
        }

        .video-stack {
          grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        }

        .meeting-bar {
          grid-template-columns: 1fr;
          justify-items: stretch;
        }

        .controls {
          order: -1;
        }
      }

      @media (max-width: 640px) {
        .board {
          grid-template-columns: 1fr;
          min-width: 0;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header class="topbar">
        <span class="presenting-pill" aria-hidden="true">K</span>
        <div>
          <h1>Realtime Kanban Meeting Assistant</h1>
          <p class="status" id="status">Not connected</p>
        </div>
      </header>

      <div class="workspace">
        <section class="presentation-tile video-tile" aria-label="Presented Kanban board">
          <div class="board-surface">
            <section id="board" class="board" aria-label="Kanban board"></section>
          </div>
          <span class="video-label">Kanban board</span>
        </section>

        <aside class="video-rail" aria-label="Conference videos">
          <div id="videoStack" class="video-stack">
            <div class="video-tile">
              <video id="localVideo" autoplay muted playsinline></video>
              <span class="video-label">You</span>
            </div>
          </div>
        </aside>
      </div>

      <footer class="meeting-bar">
        <p id="log" class="log" aria-live="polite">Team meeting</p>
        <div class="controls">
          <button id="join" class="primary" type="button">Join room</button>
          <button id="leave" type="button" disabled>Leave</button>
        </div>
        <span aria-hidden="true"></span>
      </footer>
    </main>

    <script>
      const statuses = ['Backlog', 'In Progress', 'Blocked', 'Review', 'Done']
      const boardEl = document.getElementById('board')
      const statusEl = document.getElementById('status')
      const logEl = document.getElementById('log')
      const joinButton = document.getElementById('join')
      const leaveButton = document.getElementById('leave')
      const localVideo = document.getElementById('localVideo')
      const videoStack = document.getElementById('videoStack')

      let cards = []
      let pc
      let ws
      let localStream
      const remoteElements = new Map()

      joinButton.addEventListener('click', joinRoom)
      leaveButton.addEventListener('click', leaveRoom)
      window.addEventListener('beforeunload', leaveRoom)

      renderBoard()

      async function joinRoom() {
        joinButton.disabled = true
        setStatus('Requesting camera and microphone')

        try {
          localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true })
          localVideo.srcObject = localStream

          pc = new RTCPeerConnection()
          pc.ontrack = addRemoteTrack
          pc.onicecandidate = event => {
            if (!event.candidate || ws?.readyState !== WebSocket.OPEN) {
              return
            }
            ws.send(JSON.stringify({ event: 'candidate', data: JSON.stringify(event.candidate) }))
          }
          pc.onconnectionstatechange = () => {
            setStatus(`Conference connection: ${pc.connectionState}`)
            if (['failed', 'closed', 'disconnected'].includes(pc.connectionState)) {
              leaveRoom()
            }
          }

          localStream.getTracks().forEach(track => pc.addTrack(track, localStream))

          const scheme = window.location.protocol === 'https:' ? 'wss' : 'ws'
          ws = new WebSocket(`${scheme}://${window.location.host}/websocket`)
          ws.onopen = () => {
            leaveButton.disabled = false
            setStatus('Connected')
          }
          ws.onmessage = event => handleSignal(JSON.parse(event.data))
          ws.onclose = () => leaveRoom()
          ws.onerror = () => setLog('WebSocket error')
        } catch (error) {
          setLog(error.message || String(error))
          leaveRoom()
        }
      }

      async function handleSignal(message) {
        switch (message.event) {
          case 'offer': {
            const offer = JSON.parse(message.data)
            await pc.setRemoteDescription(offer)
            const answer = await pc.createAnswer()
            await pc.setLocalDescription(answer)
            ws.send(JSON.stringify({ event: 'answer', data: JSON.stringify(answer) }))
            break
          }
          case 'candidate': {
            const candidate = JSON.parse(message.data)
            await pc.addIceCandidate(candidate)
            break
          }
          case 'kanban':
            handleKanbanMessage(JSON.parse(message.data))
            break
        }
      }

      function handleKanbanMessage(message) {
        switch (message.event) {
          case 'board':
            cards = Array.isArray(message.data?.cards) ? message.data.cards : []
            renderBoard()
            break
          case 'status':
            setLog(String(message.data || ''))
            break
        }
      }

      function addRemoteTrack(event) {
        if (event.track.kind === 'audio') {
          return
        }

        const stream = event.streams[0]
        if (!stream || remoteElements.has(stream.id)) {
          return
        }

        const tile = document.createElement('div')
        tile.className = 'video-tile'

        const video = document.createElement('video')
        video.autoplay = true
        video.playsInline = true
        video.srcObject = stream

        const label = document.createElement('span')
        label.className = 'video-label'
        label.textContent = 'Participant'

        tile.append(video, label)
        videoStack.appendChild(tile)
        remoteElements.set(stream.id, tile)

        stream.onremovetrack = () => {
          tile.remove()
          remoteElements.delete(stream.id)
        }
      }

      function renderBoard() {
        boardEl.replaceChildren(...statuses.map(status => {
          const columnCards = cards.filter(card => card.status === status)
          const column = document.createElement('section')
          column.className = 'column'
          column.setAttribute('aria-label', `${status} cards`)

          const header = document.createElement('header')
          const title = document.createElement('h2')
          title.textContent = status
          const count = document.createElement('span')
          count.className = 'count'
          count.textContent = String(columnCards.length)
          header.append(title, count)

          const stack = document.createElement('div')
          stack.className = 'stack'
          if (columnCards.length === 0) {
            const empty = document.createElement('div')
            empty.className = 'empty'
            empty.textContent = 'Empty'
            stack.appendChild(empty)
          } else {
            stack.append(...columnCards.map(renderCard))
          }

          column.append(header, stack)
          return column
        }))
      }

      function renderCard(card) {
        const article = document.createElement('article')
        article.className = 'card'

        const title = document.createElement('strong')
        title.textContent = card.title
        article.appendChild(title)

        if (card.notes) {
          const notes = document.createElement('p')
          notes.textContent = card.notes
          article.appendChild(notes)
        }

        if (card.tags?.length > 0) {
          const tags = document.createElement('ul')
          tags.className = 'tags'
          tags.setAttribute('aria-label', `${card.title} tags`)
          tags.append(...card.tags.map(tag => {
            const item = document.createElement('li')
            const colors = tagColors(tag)
            item.style.setProperty('--tag-bg', colors.background)
            item.style.setProperty('--tag-color', colors.color)
            item.textContent = tag
            return item
          }))
          article.appendChild(tags)
        }

        return article
      }

      function tagColors(tag) {
        let hash = 0
        for (const character of String(tag)) {
          hash = ((hash << 5) - hash + character.charCodeAt(0)) | 0
        }

        const hue = Math.abs(hash) % 360
        return {
          background: `hsl(${hue} 78% 90%)`,
          color: `hsl(${hue} 72% 26%)`
        }
      }

      function leaveRoom() {
        joinButton.disabled = false
        leaveButton.disabled = true

        if (ws && ws.readyState !== WebSocket.CLOSED) {
          ws.close()
        }
        ws = undefined

        if (pc) {
          pc.close()
        }
        pc = undefined

        if (localStream) {
          localStream.getTracks().forEach(track => track.stop())
        }
        localStream = undefined
        localVideo.srcObject = null

        remoteElements.forEach(tile => tile.remove())
        remoteElements.clear()
        setStatus('Not connected')
      }

      function setStatus(message) {
        statusEl.textContent = message
      }

      function setLog(message) {
        logEl.textContent = message
      }
    </script>
  </body>
</html>
